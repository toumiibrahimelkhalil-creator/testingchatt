<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-D World | Final Hardware Override</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050507] text-white h-screen flex items-center justify-center overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function VibeOverride() {
            const [isVibrating, setIsVibrating] = useState(false);
            const loop = useRef(null);

            const forceVibration = () => {
                if (isVibrating) {
                    clearInterval(loop.current);
                    setIsVibrating(false);
                    return;
                }

                setIsVibrating(true);

                // Start the high-frequency burst loop
                loop.current = setInterval(() => {
                    const gps = navigator.getGamepads();
                    for (let gp of gps) {
                        if (gp && gp.connected) {
                            // 1. Try standard Dual-Rumble
                            if (gp.vibrationActuator) {
                                gp.vibrationActuator.playEffect("dual-rumble", {
                                    startDelay: 0,
                                    duration: 150, // Ultra-short bursts to bypass BT lag
                                    strongMagnitude: 1.0,
                                    weakMagnitude: 1.0
                                }).catch(() => {});
                            }
                            
                            // 2. Try the WebKit-specific 'hapticActuators' hidden array
                            if (gp.hapticActuators) {
                                gp.hapticActuators.forEach(h => {
                                    if (h.pulse) h.pulse(1.0, 150);
                                });
                            }
                        }
                    }

                    // 3. Absolute Fallback: Shake the iPhone itself
                    // This PROVES the script is running. If the phone shakes but the controller doesn't,
                    // the iPhone is physically blocking the Bluetooth rumble signal.
                    if (navigator.vibrate) navigator.vibrate(100);
                    
                }, 100); // 10 times per second
            };

            return (
                <div class="p-12 bg-zinc-900/50 border border-white/10 rounded-[3.5rem] w-full max-w-sm text-center backdrop-blur-3xl shadow-2xl">
                    <h1 class="text-3xl font-black italic text-purple-500 mb-10 tracking-tighter">HARDWARE OVERRIDE</h1>
                    
                    <button 
                        onPointerDown={forceVibration}
                        class={`w-full py-12 rounded-[2.5rem] font-black uppercase tracking-[0.2em] transition-all active:scale-95 ${isVibrating ? 'bg-red-500 shadow-2xl shadow-red-500/40' : 'bg-purple-600 shadow-2xl shadow-purple-500/40'}`}
                    >
                        {isVibrating ? 'STOP' : 'FORCE VIBRATE'}
                    </button>

                    <div class="mt-10 p-6 bg-black/40 rounded-3xl text-[9px] text-left space-y-3 font-bold uppercase opacity-40 leading-relaxed tracking-widest">
                        <p>• Ensure iPhone Ringer Switch is UP (Not Silent)</p>
                        <p>• Press <span class="text-purple-400">TOUCHPAD</span> on PS4 controller first</p>
                        <p>• If ONLY the phone shakes, your iPhone model blocks Bluetooth Rumble</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VibeOverride />);
    </script>
</body>
</html>
