        .bg-orbs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.30; animation: floatOrb linear infinite; }
        .orb1 { width:650px; height:650px; background:#7b00d4; top:-220px;   left:-180px;  animation-duration:20s; }
        .orb2 { width:520px; height:520px; background:#d500f9; top:38%;      right:-200px; animation-duration:24s; animation-delay:-8s; }
        .orb3 { width:420px; height:420px; background:#3d00b0; bottom:-160px;left:28%;     animation-duration:17s; animation-delay:-4s; }
        .orb4 { width:360px; height:360px; background:#9c00ff; top:18%;      left:42%;     animation-duration:27s; animation-delay:-14s; }
        @keyframes floatOrb {
            0%   { transform: translate(0,0)         scale(1);    }
            25%  { transform: translate(70px,-50px)  scale(1.06); }
            50%  { transform: translate(-50px,80px)  scale(0.94); }
            75%  { transform: translate(90px,35px)   scale(1.09); }
            100% { transform: translate(0,0)         scale(1);    }

        #root { position: relative; z-index: 1; }

        .glass {
            background: rgba(14,10,28,0.55);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-right: 1px solid rgba(255,255,255,0.07);
        }
        .glass-panel {
            background: rgba(20,14,38,0.62);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(213,0,249,0.15);
        }

        .active-tab { border-left: 4px solid #d500f9; background: rgba(213,0,249,0.15); color: #d500f9; }
        .nav-btn { transition: all 0.2s ease; border-radius: 12px; margin: 4px 12px; padding: 12px; text-align: left; }
        .nav-btn:hover { background: rgba(255,255,255,0.06); }
        .msg-mine   { background: linear-gradient(135deg,#6a1b9a,#4a148c); border-radius: 18px 18px 2px 18px; }
        .msg-theirs { background: rgba(28,18,48,0.75); border:1px solid rgba(255,255,255,0.08); border-radius: 18px 18px 18px 2px; }
        .media-content { max-width:100%; max-height:300px; border-radius:12px; margin-top:8px; border:1px solid rgba(255,255,255,0.1); }

        .btn-start  { background: #d500f9; box-shadow: 0 0 20px rgba(213,0,249,0.4); }
        .btn-stop   { background: #ff1744; box-shadow: 0 0 20px rgba(255,23,68,0.4); }
        .vibe-btn:active { transform: scale(0.95); opacity: 0.8; }
        input[type=range] { accent-color: #d500f9; cursor: pointer; }

        .call-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(4,2,14,0.88);
            backdrop-filter: blur(32px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 28px;
        }
        .call-videos { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
        .call-videos video {
            width: 360px; max-width: 90vw; height: 250px;
            border-radius: 20px; background: #0d0818;
            border: 2px solid rgba(213,0,249,0.35); object-fit: cover;
        }
        .call-btn { width:66px; height:66px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; cursor:pointer; transition:transform .15s; border:none; }
        .call-btn:active { transform: scale(0.9); }
        .call-btn-end  { background:#ff1744; box-shadow:0 0 28px rgba(255,23,68,.55); }
        .call-btn-mute { background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.22)!important; }
        .call-btn-cam  { background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.22)!important; }
        .call-actions  { display:flex; gap:22px; }
        .call-name   { font-size:24px; font-weight:900; letter-spacing:.05em; color:#fff; text-shadow:0 0 22px rgba(213,0,249,.7); }
        .call-status { font-size:11px; text-transform:uppercase; opacity:.45; letter-spacing:.18em; }

        .incoming-banner {
            position:fixed; bottom:80px; right:24px; z-index:150;
            background:rgba(18,10,36,0.92); backdrop-filter:blur(22px);

        @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

        .hdr-call-btn {
            background:rgba(213,0,249,0.14); border:1px solid rgba(213,0,249,0.30);
            border-radius:12px; padding:8px 16px; cursor:pointer; font-size:18px; transition:background .2s;
        }
        .hdr-call-btn:hover { background:rgba(213,0,249,0.30); }

function CallOverlay({ state, onEnd, onMute, onCam }) {
    const localRef  = useRef(null);
    const remoteRef = useRef(null);
    useEffect(() => {
        if (localRef.current  && state.localStream)  localRef.current.srcObject  = state.localStream;
        if (remoteRef.current && state.remoteStream) remoteRef.current.srcObject = state.remoteStream;
    }, [state.localStream, state.remoteStream]);
    return (
        <div className="call-overlay">
            <div className="call-name">{state.remoteName}</div>
            <div className="call-status">{state.status}</div>
            {state.isVideo && (
                <div className="call-videos">

                    <video ref={localRef}  autoPlay playsInline muted style={{opacity:.8,border:'1px solid rgba(255,255,255,.2)'}} />

                <button className="call-btn call-btn-mute" onClick={onMute}>{state.isMuted?'🔇':'🎙️'}</button>
                {state.isVideo && <button className="call-btn call-btn-cam" onClick={onCam}>{state.isCamOff?'📷':'🎥'}</button>}
                <button className="call-btn call-btn-end" onClick={onEnd}>📵</button>
            </div>
        </div>
    );
}

function App() {

    const [messages,        setMessages]        = useState([]);
    const [friends,         setFriends]         = useState([]);
    const [requests,        setRequests]        = useState([]);
    const [text,            setText]            = useState('');
    const [searchName,      setSearchName]      = useState('');
    const [isUploading,     setIsUploading]     = useState(false);
    const [hasGamepad,      setHasGamepad]      = useState(false);
    const [intensity,       setIntensity]       = useState({ heavy:1.0, light:1.0 });
    const vibeInterval = useRef(null);
    const chatEndRef   = useRef(null);

    const [activeCall,   setActiveCall]   = useState(null);
    const [incomingCall, setIncomingCall] = useState(null);
    const pcRef = useRef(null);

    useEffect(() => {
        sb.auth.getSession().then(({ data:{session} }) => setSession(session));
        sb.auth.onAuthStateChange((_e,s) => setSession(s));
    }, []);

    useEffect(() => {
        if (!session) return;
        fetchProfile(); refreshSocial();

        const vibeCh = sb.channel(`vibe-${currentChat}`)
            .on('broadcast',{event:'vibrate'},({payload}) => {
                if (payload.action==='START') startLocalVibe(payload.settings); else stopLocalVibe();
            }).subscribe();

        const dataCh = sb.channel('sync')
            .on('postgres_changes',{event:'*',schema:'public',table:'messages'}, fetchMessages)
            .on('postgres_changes',{event:'*',schema:'public',table:'friends'},  refreshSocial)
            .on('postgres_changes',{event:'*',schema:'public',table:'profiles'}, fetchProfile)
            .subscribe();

        const callCh = sb.channel(`calls:${session.user.id}`)
            .on('broadcast',{event:'signal'},({payload}) => handleSignal(payload))
            .subscribe();

        const checkGP = () => setHasGamepad(Object.values(navigator.getGamepads()).some(g=>g!==null));
        window.addEventListener('gamepadconnected',    checkGP);
        window.addEventListener('gamepaddisconnected', checkGP);

        return () => { sb.removeChannel(vibeCh); sb.removeChannel(dataCh); sb.removeChannel(callCh); stopLocalVibe(); };
    }, [session, currentChat]);

    useEffect(() => { fetchMessages(); }, [currentChat, session]);
    useEffect(() => { chatEndRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

    const startLocalVibe = (s) => {
        if (vibeInterval.current) clearInterval(vibeInterval.current);
        const run = () => { for (const gp of navigator.getGamepads()) { if (gp?.vibrationActuator) gp.vibrationActuator.playEffect('dual-rumble',{startDelay:0,duration:250,weakMagnitude:s.light,strongMagnitude:s.heavy}); } };
        run(); vibeInterval.current = setInterval(run, 180);
    };
    const stopLocalVibe = () => { clearInterval(vibeInterval.current); vibeInterval.current = null; };

    const broadcastVibration = async (action) => {
        if (action==='START') startLocalVibe(intensity); else stopLocalVibe();
        await sb.channel(`vibe-${currentChat}`).send({ type:'broadcast', event:'vibrate', payload:{action,settings:intensity,sender:profile?.username} });
    };

    const sendSignal = async (toId, payload) => {
        await sb.channel(`calls:${toId}`).send({ type:'broadcast', event:'signal', payload });
    };

    const handleSignal = async ({type, ...rest}) => {
        if      (type==='offer')  setIncomingCall({from:rest.from, fromName:rest.fromName, isVideo:rest.isVideo, offer:rest.offer});
        else if (type==='answer') await pcRef.current?.setRemoteDescription(new RTCSessionDescription(rest.answer));
        else if (type==='ice')    await pcRef.current?.addIceCandidate(new RTCIceCandidate(rest.candidate));
        else if (type==='end')    hangUp(false);
    };

    const makePeer = (remoteId) => {
        const pc = new RTCPeerConnection(ICE);
        pc.onicecandidate = e => { if (e.candidate) sendSignal(remoteId, {type:'ice', candidate:e.candidate}); };
        pc.ontrack = e => setActiveCall(prev => prev ? {...prev, remoteStream:e.streams[0], status:'Connected'} : prev);
        pcRef.current = pc; return pc;
    };

    const startCall = async (friendId, friendName, isVideo) => {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:isVideo}).catch(() => null);
        if (!stream) return alert('Could not access ' + (isVideo?'camera/':'') + 'microphone. Check browser permissions.');
        const pc = makePeer(friendId);
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await sendSignal(friendId, {type:'offer', from:session.user.id, fromName:profile.username, isVideo, offer});
        setActiveCall({remoteName:friendName, remoteId:friendId, isVideo, status:'Calling…', localStream:stream, remoteStream:null, isMuted:false, isCamOff:false});
    };

    const answerCall = async () => {
        if (!incomingCall) return;
        const {from, fromName, isVideo, offer} = incomingCall;
        const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:isVideo}).catch(() => null);
        if (!stream) return alert('Could not access microphone.');
        const pc = makePeer(from);
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await sendSignal(from, {type:'answer', answer});
        setIncomingCall(null);
        setActiveCall({remoteName:fromName, remoteId:from, isVideo, status:'Connected', localStream:stream, remoteStream:null, isMuted:false, isCamOff:false});
    };

    const declineCall = async () => {
        if (incomingCall) await sendSignal(incomingCall.from, {type:'end'});
        setIncomingCall(null);
    };

    const hangUp = (notify=true) => {
        if (notify && activeCall) sendSignal(activeCall.remoteId, {type:'end'});
        pcRef.current?.close(); pcRef.current = null;
        activeCall?.localStream?.getTracks().forEach(t => t.stop());
        setActiveCall(null);
    };

    const toggleMute = () => {
        if (!activeCall?.localStream) return;
        const v = !activeCall.isMuted;
        activeCall.localStream.getAudioTracks().forEach(t => t.enabled = !v);
        setActiveCall(p => ({...p, isMuted:v}));
    };

    const toggleCam = () => {
        if (!activeCall?.localStream) return;
        const v = !activeCall.isCamOff;
        activeCall.localStream.getVideoTracks().forEach(t => t.enabled = !v);
        setActiveCall(p => ({...p, isCamOff:v}));
    };

    const fetchProfile = async () => {
        const {data} = await sb.from('profiles').select('*').eq('id',session.user.id).single();
        setProfile(data);
    };

    const refreshSocial = async () => {
        const {data:fList} = await sb.from('friends').select('*, friend:profiles!friends_friend_id_fkey(*), sender:profiles!friends_user_id_fkey(*)').eq('status',1).or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
        const {data:rList} = await sb.from('friends').select('*, sender:profiles!friends_user_id_fkey(*)').eq('friend_id',session.user.id).eq('status',0);
        setFriends(fList?.map(f => f.user_id===session.user.id ? f.friend : f.sender) || []);
        setRequests(rList || []);
    };

    const fetchMessages = async () => {
        if (!session) return;
        let q = sb.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at',{ascending:true});
        if (currentChat==='public') q = q.is('receiver_id',null);
        else q = q.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
        const {data} = await q; setMessages(data || []);
    };

    const sendMsg = async () => {
        if (!text.trim()) return;
        await sb.from('messages').insert([{sender_id:session.user.id, receiver_id:currentChat==='public'?null:currentChat, content:text}]);
        setText('');
    };

    const uploadFile = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsUploading(true);
        const path = `chat_media/${Math.random()}.${file.name.split('.').pop()}`;
        await sb.storage.from('uploads').upload(path, file);
        const {data:{publicUrl}} = sb.storage.from('uploads').getPublicUrl(path);
        const type = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : 'file';
        await sb.from('messages').insert([{sender_id:session.user.id, receiver_id:currentChat==='public'?null:currentChat, content:`Sent a ${type}`, file_url:publicUrl, file_type:type}]);
        setIsUploading(false);
    };

    if (!session) return <AuthUI />;
    const isPrivate = currentChat !== 'public';

    return (
        <>
            {activeCall && <CallOverlay state={activeCall} onEnd={()=>hangUp(true)} onMute={toggleMute} onCam={toggleCam} />}

            {incomingCall && !activeCall && (
                <div className="incoming-banner">
                    <div>
                        <div style={{fontWeight:900,fontSize:14}}>{incomingCall.fromName}</div>
                        <div style={{fontSize:10,opacity:.45,textTransform:'uppercase',letterSpacing:'.1em'}}>
                            Incoming {incomingCall.isVideo?'Video':'Voice'} Call
                        </div>
                    </div>
                    <button onClick={answerCall}  style={{background:'#00c853',border:'none',borderRadius:'50%',width:46,height:46,fontSize:22,cursor:'pointer'}}>📞</button>
                    <button onClick={declineCall} style={{background:'#ff1744',border:'none',borderRadius:'50%',width:46,height:46,fontSize:22,cursor:'pointer'}}>📵</button>
                </div>
            )}

            <div className="flex h-screen">
                {/* Sidebar */}
                <div className="w-20 lg:w-72 glass flex flex-col py-6">
                    <div className="px-6 mb-10 hidden lg:block">
                        <h1 className="text-2xl font-black text-purple-500 italic">K-D WORLD</h1>
                    </div>
                    <div className="flex-1 space-y-2">
                        <button onClick={()=>setView('chat')}     className={`nav-btn w-full flex items-center gap-4 ${view==='chat'    ?'active-tab':''}`}><span>💬</span><span className="hidden lg:inline font-bold">Chambers</span></button>
                        <button onClick={()=>setView('social')}   className={`nav-btn w-full flex items-center gap-4alone/babel.min.js"></script>

        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 18px 18px 18px 2px; }

                }
            }, [session, currentChat]);

            useEffect(() => { fetchMessages(); }, [currentChat, session]);
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            // VIBRATION ENGINE (CONSTANT & INSTANT)
            const startLocalVibe = (settings) => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                const run = () => {
                    const gps = navigator.getGamepads();
                    for (const gp of gps) {
                        if (gp?.vibrationActuator) {
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0, duration: 250, 
                                weakMagnitude: settings.light, strongMagnitude: settings.heavy
                            });
                        }
                    }
                };
                run();
                vibeInterval.current = setInterval(run, 180); // Overlap for constant motion
            };

            const stopLocalVibe = () => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                vibeInterval.current = null;
            };

            const broadcastVibration = async (action) => {
                if (action === 'START') startLocalVibe(intensity);
                else stopLocalVibe();

                await supabaseClient.channel(`vibe-${currentChat}`).send({
                    type: 'broadcast', event: 'vibrate',
                    payload: { action, settings: intensity, sender: profile?.username }
                });
            };

            // EXISTING SOCIAL LOGIC
            const fetchProfile = async () => {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                setProfile(data);
            };

            const refreshSocial = async () => {
                const { data: fList } = await supabaseClient.from('friends').select('*, friend:profiles!friends_friend_id_fkey(*), sender:profiles!friends_user_id_fkey(*)').eq('status', 1).or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                const { data: rList } = await supabaseClient.from('friends').select('*, sender:profiles!friends_user_id_fkey(*)').eq('friend_id', session.user.id).eq('status', 0);
                setFriends(fList?.map(f => f.user_id === session.user.id ? f.friend : f.sender) || []);
                setRequests(rList || []);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') query = query.is('receiver_id', null);
                else query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                const { data } = await query;
                setMessages(data || []);
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ sender_id: session.user.id, receiver_id: currentChat === 'public' ? null : currentChat, content: text }]);
                setText('');
            };

            const uploadFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                const path = `chat_media/${Math.random()}.${file.name.split('.').pop()}`;
                await supabaseClient.storage.from('uploads').upload(path, file);
                const { data: { publicUrl } } = supabaseClient.storage.from('uploads').getPublicUrl(path);
                let type = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : 'file';
                await supabaseClient.from('messages').insert([{ sender_id: session.user.id, receiver_id: currentChat === 'public' ? null : currentChat, content: `Sent a ${type}`, file_url: publicUrl, file_type: type }]);
                setIsUploading(false);
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen">
                    {/* SIDEBAR */}
                    <div className="w-20 lg:w-72 glass flex flex-col py-6">
                        <div className="px-6 mb-10 hidden lg:block"><h1 className="text-2xl font-black text-purple-500 italic">K-D WORLD</h1></div>
                        <div className="flex-1 space-y-2">
                            <button onClick={() => setView('chat')} className={`nav-btn w-full flex items-center gap-4 ${view === 'chat' ? 'active-tab' : ''}`}>
                                <span>💬</span> <span className="hidden lg:inline font-bold">Chambers</span>
                            </button>
                            <button onClick={() => setView('social')} className={`nav-btn w-full flex items-center gap-4 ${view === 'social' ? 'active-tab' : ''}`}>
                                <span>👥</span> <span className="hidden lg:inline font-bold">Social</span>
                            </button>
                            <button onClick={() => setView('settings')} className={`nav-btn w-full flex items-center gap-4 ${view === 'settings' ? 'active-tab' : ''}`}>
                                <span>⚙️</span> <span className="hidden lg:inline font-bold">Settings</span>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col bg-[#050507]">
                        {view === 'chat' ? (
                            <div className="flex flex-1 overflow-hidden">
                                <div className="w-64 border-r border-white/5 hidden lg:flex flex-col bg-black/20">
                                    <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} className={`p-4 text-left font-bold ${currentChat === 'public' ? 'text-purple-400 bg-purple-500/10' : ''}`}>🌐 Public Room</button>
                                    <div className="p-4 text-[10px] font-black opacity-30 uppercase tracking-widest">Friends</div>
                                    {friends.map(f => (
                                        <button key={f.id} onClick={() => {setCurrentChat(f.id); setCurrentChatName(f.username);}} className={`p-4 flex items-center gap-3 text-sm font-medium ${currentChat === f.id ? 'text-purple-400 bg-purple-500/10' : ''}`}>
                                            <img src={f.avatar_url || 'https://via.placeholder.com/100'} className="w-6 h-6 rounded-full object-cover" /> {f.username}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex-1 flex flex-col">
                                    <header className="p-6 border-b border-white/5 font-black text-xl flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <span className="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span> {currentChatName}
                                        </div>
                                        <div className="text-[10px] font-black opacity-30 uppercase tracking-[0.2em]">{hasGamepad ? 'Device Linked' : 'No Controller'}</div>
                                    </header>

                                    {/* RUMBLECTRL SECTION (HALF TOP OF CHAT) */}
                                    <div className="vibe-panel p-6 flex flex-col items-center">
                                        <div className="grid grid-cols-2 gap-8 w-full max-w-md mb-6">
                                            <div className="flex flex-col gap-2">
                                                <div className="flex justify-between text-[9px] font-black opacity-40 uppercase"><span>Heavy</span><span>{Math.round(intensity.heavy * 100)}%</span></div>
                                                <input type="range" min="0" max="1" step="0.1" value={intensity.heavy} onChange={e => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} />
                                            </div>
                                            <div className="flex flex-col gap-2">
                                                <div className="flex justify-between text-[9px] font-black opacity-40 uppercase"><span>Light</span><span>{Math.round(intensity.light * 100)}%</span></div>
                                                <input type="range" min="0" max="1" step="0.1" value={intensity.light} onChange={e => setIntensity({...intensity, light: parseFloat(e.target.value)})} />
                                            </div>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={() => broadcastVibration('START')} className="btn-start vibe-btn px-10 py-3 rounded-full font-black text-xs uppercase italic">Start Constant</button>
                                            <button onClick={() => broadcastVibration('STOP')} className="btn-stop vibe-btn px-10 py-3 rounded-full font-black text-xs uppercase italic">Stop</button>
                                        </div>
                                    </div>

                                    {/* MESSAGES AREA */}
                                    <div className="flex-1 p-6 overflow-y-auto flex flex-col gap-6">
                                        {messages.map((msg, i) => (
                                            <div key={i} className={`flex gap-3 ${msg.sender_id === session.user.id ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <img src={msg.profiles?.avatar_url || 'https://via.placeholder.com/100'} className="w-10 h-10 rounded-full object-cover" />
                                                <div className={`flex flex-col ${msg.sender_id === session.user.id ? 'items-end' : 'items-start'} max-w-[75%]`}>
                                                    <span className="text-[10px] font-bold opacity-30 mb-1 uppercase">{msg.profiles?.username}</span>
                                                    <div className={`p-4 text-sm ${msg.sender_id === session.user.id ? 'msg-mine' : 'msg-theirs'}`}>
                                                        {msg.file_url ? null : <p>{msg.content}</p>}
                                                        {msg.file_type === 'image' && <img src={msg.file_url} className="media-content" />}
                                                        {msg.file_type === 'video' && <video src={msg.file_url} controls className="media-content" />}
                                                        {msg.file_type === 'file' && <a href={msg.file_url} target="_blank" className="underline italic">📄 Download</a>}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef} />
                                    </div>

                                    {/* INPUT */}
                                    <div className="p-6 border-t border-white/5">
                                        <div className="max-w-4xl mx-auto flex gap-3 bg-white/5 p-2 rounded-2xl border border-white/10 items-center">
                                            <label className="p-3 cursor-pointer hover:bg-white/10 rounded-xl transition text-xl">
                                                {isUploading ? '⏳' : '📎'} <input type="file" className="hidden" onChange={uploadFile} disabled={isUploading} />
                                            </label>
                                            <input className="flex-1 bg-transparent px-4 py-2 outline-none" placeholder="Write something..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                            <button onClick={sendMsg} className="bg-purple-600 px-6 py-3 rounded-xl font-black text-xs">SEND</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : view === 'social' ? (
                            <div className="p-10 max-w-2xl mx-auto space-y-10">
                                <div className="glass p-6 rounded-3xl border border-white/10">
                                    <h3 className="text-xl font-black mb-4">Add Friend</h3>
                                    <div className="flex gap-2">
                                        <input className="flex-1 bg-white/5 border border-white/10 p-4 rounded-xl outline-none" placeholder="Username..." value={searchName} onChange={e => setSearchName(e.target.value)} />
                                        <button onClick={async () => {
                                            const { data: target } = await supabaseClient.from('profiles').select('id').eq('username', searchName).single();
                                            if (target) await supabaseClient.from('friends').insert([{ user_id: session.user.id, friend_id: target.id, status: 0 }]);
                                            setSearchName('');
                                        }} className="bg-purple-600 px-8 rounded-xl font-black">SEND</button>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="text-xl font-black italic">Friend Requests</h3>
                                    {requests.map(r => (
                                        <div key={r.id} className="glass p-4 rounded-2xl flex items-center justify-between border border-white/5">
                                            <span className="font-bold">{r.sender.username}</span>
                                            <button onClick={async () => {
                                                await supabaseClient.from('friends').update({ status: 1 }).eq('id', r.id);
                                                refreshSocial();
                                            }} className="bg-green-600 px-6 py-2 rounded-lg font-black text-[10px]">ACCEPT</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="p-10 max-w-2xl mx-auto space-y-6">
                                <h2 className="text-3xl font-black italic">Settings</h2>
                                <div className="glass p-8 rounded-3xl border border-white/10 space-y-6">
                                    <div className="flex flex-col gap-2">
                                        <label className="text-xs font-black opacity-40 uppercase">Avatar</label>
                                        <input type="file" onChange={async (e) => {
                                            const file = e.target.files[0];
                                            const path = `avatars/${session.user.id}.png`;
                                            await supabaseClient.storage.from('uploads').upload(path, file, { upsert: true });
                                            const { data: { publicUrl } } = supabaseClient.storage.from('uploads').getPublicUrl(path);
                                            await supabaseClient.from('profiles').update({ avatar_url: publicUrl }).eq('id', session.user.id);
                                            fetchProfile();
                                        }} />
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        <label className="text-xs font-black opacity-40 uppercase">Username</label>
                                        <input className="bg-white/5 border border-white/10 p-4 rounded-xl outline-none" value={profile?.username || ''} onChange={e => setProfile({...profile, username: e.target.value})} />
                                    </div>
                                    <button onClick={async () => {
                                        await supabaseClient.from('profiles').update({ username: profile.username }).eq('id', session.user.id);
                                        alert("Updated!");
                                    }} className="w-full bg-purple-600 py-4 rounded-xl font-black">SAVE CHANGES</button>
                                    <button onClick={() => supabaseClient.auth.signOut()} className="w-full bg-red-600/20 text-red-500 py-4 rounded-xl font-black">LOGOUT</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username }]);
                } else await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
            };
            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm border border-white/10 text-center">
                        <h1 className="text-4xl font-black text-purple-500 italic mb-10">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />}
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-5 rounded-2xl font-black text-xs">{mode.toUpperCase()}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-center text-[10px] cursor-pointer mt-4 uppercase opacity-50 font-bold">Switch to {mode === 'login' ? 'Signup' : 'Login'}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
