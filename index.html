<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Vibration Controller</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #08080a; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-start { background: #d500f9; box-shadow: 0 0 20px rgba(213, 0, 249, 0.4); }
        .btn-stop { background: #ff1744; box-shadow: 0 0 20px rgba(255, 23, 68, 0.4); }
        .vibe-btn:active { transform: scale(0.95); opacity: 0.8; }
        input[type=range] { accent-color: #d500f9; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function VibrationApp() {
            const [hasGamepad, setHasGamepad] = useState(false);
            const [isVibrating, setIsVibrating] = useState(false);
            const [intensity, setIntensity] = useState({ heavy: 1.0, light: 1.0 });
            const vibeInterval = useRef(null);

            useEffect(() => {
                const checkGP = () => {
                    const gps = navigator.getGamepads();
                    setHasGamepad(Object.values(gps).some(g => g !== null));
                };

                window.addEventListener("gamepadconnected", checkGP);
                window.addEventListener("gamepaddisconnected", checkGP);
                
                // Initial check
                checkGP();

                return () => {
                    window.removeEventListener("gamepadconnected", checkGP);
                    window.removeEventListener("gamepaddisconnected", checkGP);
                    stopVibe();
                };
            }, []);

            const startVibe = () => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                setIsVibrating(true);

                const run = () => {
                    const gps = navigator.getGamepads();
                    for (const gp of gps) {
                        if (gp?.vibrationActuator) {
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0, 
                                duration: 250, 
                                weakMagnitude: intensity.light, 
                                strongMagnitude: intensity.heavy
                            });
                        }
                    }
                    // Fallback for phone vibration if supported
                    if (navigator.vibrate) navigator.vibrate(200);
                };

                run();
                vibeInterval.current = setInterval(run, 180);
            };

            const stopVibe = () => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                vibeInterval.current = null;
                setIsVibrating(false);
            };

            return (
                <div className="glass p-10 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl">
                    <h1 className="text-3xl font-black text-purple-500 italic mb-2 tracking-tighter">K-D VIBE</h1>
                    <p className="text-[10px] font-black opacity-30 uppercase tracking-[0.3em] mb-10">
                        {hasGamepad ? 'Hardware Connected' : 'Waiting for Controller...'}
                    </p>

                    <div className="space-y-8 mb-10">
                        <div className="flex flex-col gap-3">
                            <div className="flex justify-between text-[10px] font-black opacity-40 uppercase tracking-widest">
                                <span>Heavy Motor</span>
                                <span>{Math.round(intensity.heavy * 100)}%</span>
                            </div>
                            <input 
                                type="range" min="0" max="1" step="0.1" 
                                value={intensity.heavy} 
                                onChange={e => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} 
                            />
                        </div>

                        <div className="flex flex-col gap-3">
                            <div className="flex justify-between text-[10px] font-black opacity-40 uppercase tracking-widest">
                                <span>Light Motor</span>
                                <span>{Math.round(intensity.light * 100)}%</span>
                            </div>
                            <input 
                                type="range" min="0" max="1" step="0.1" 
                                value={intensity.light} 
                                onChange={e => setIntensity({...intensity, light: parseFloat(e.target.value)})} 
                            />
                        </div>
                    </div>

                    <div className="flex flex-col gap-4">
                        {!isVibrating ? (
                            <button 
                                onClick={startVibe} 
                                className="btn-start vibe-btn w-full py-5 rounded-3xl font-black text-xs uppercase italic tracking-widest"
                            >
                                Start Vibration
                            </button>
                        ) : (
                            <button 
                                onClick={stopVibe} 
                                className="btn-stop vibe-btn w-full py-5 rounded-3xl font-black text-xs uppercase italic tracking-widest"
                            >
                                Stop
                            </button>
                        )}
                    </div>

                    <div className="mt-8 pt-6 border-t border-white/5 text-[9px] font-bold opacity-20 uppercase leading-relaxed">
                        Adjust sliders to change intensity<br/>
                        Ensure controller is active
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VibrationApp />);
    </script>
</body>
</html>
