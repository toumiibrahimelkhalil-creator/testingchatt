<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | RumbleCTRL Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #08080a; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.15); color: #d500f9; }
        .msg-mine { background: linear-gradient(135deg, #6a1b9a, #4a148c); border-radius: 18px 18px 2px 18px; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 18px 18px 18px 2px; }
        
        /* RumbleCTRL Ultra Styles */
        .vibe-panel { background: rgba(213, 0, 249, 0.03); border-bottom: 1px solid rgba(213, 0, 249, 0.1); }
        .btn-vibe-start { background: #d500f9; box-shadow: 0 0 25px rgba(213, 0, 249, 0.5); }
        .btn-vibe-stop { background: #ff1744; box-shadow: 0 0 25px rgba(255, 23, 68, 0.5); }
        .btn-vibe-start:active, .btn-vibe-stop:active { transform: scale(0.92); }
        input[type=range] { accent-color: #d500f9; cursor: pointer; height: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [view, setView] = useState('chat'); 
            const [currentChat, setCurrentChat] = useState('public');
            const [messages, setMessages] = useState([]);
            
            // Controller States
            const [hasGamepad, setHasGamepad] = useState(false);
            const [vibeSettings, setVibeSettings] = useState({ heavy: 0.8, light: 0.5, speed: 200 });
            const [isActive, setIsActive] = useState(false);
            const vibeTimer = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    const channel = supabaseClient.channel(`vibe_${currentChat}`)
                        .on('broadcast', { event: 'vibe_cmd' }, ({ payload }) => {
                            if (payload.type === 'START') runVibration(payload.data);
                            else stopVibration();
                        }).subscribe();

                    const detect = () => setHasGamepad(Object.values(navigator.getGamepads()).some(g => g !== null));
                    window.addEventListener("gamepadconnected", detect);
                    window.addEventListener("gamepaddisconnected", detect);
                    return () => { supabaseClient.removeChannel(channel); stopVibration(); };
                }
            }, [session, currentChat]);

            const runVibration = (settings) => {
                setIsActive(true);
                if (vibeTimer.current) clearInterval(vibeTimer.current);
                
                const exec = () => {
                    const gps = navigator.getGamepads();
                    for (const gp of gps) {
                        if (gp?.vibrationActuator) {
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0,
                                duration: 1000, 
                                weakMagnitude: settings.light,
                                strongMagnitude: settings.heavy
                            });
                        }
                    }
                };
                exec();
                vibeTimer.current = setInterval(exec, settings.speed);
            };

            const stopVibration = () => {
                setIsActive(false);
                if (vibeTimer.current) clearInterval(vibeTimer.current);
                vibeTimer.current = null;
            };

            const handleStart = () => {
                runVibration(vibeSettings); // Instant local response
                supabaseClient.channel(`vibe_${currentChat}`).send({
                    type: 'broadcast',
                    event: 'vibe_cmd',
                    payload: { type: 'START', data: vibeSettings }
                });
            };

            const handleStop = () => {
                stopVibration();
                supabaseClient.channel(`vibe_${currentChat}`).send({
                    type: 'broadcast',
                    event: 'vibe_cmd',
                    payload: { type: 'STOP' }
                });
            };

            if (!session) return <div className="bg-black h-screen flex items-center justify-center font-black italic text-purple-600 text-4xl">K-D WORLD</div>;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <div className="w-20 lg:w-72 glass flex flex-col py-8">
                        <h1 className="hidden lg:block px-8 text-2xl font-black text-purple-500 italic mb-10 tracking-tighter">K-D WORLD</h1>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setView('chat')} className={`w-full p-4 flex items-center gap-4 font-bold ${view === 'chat' ? 'active-tab' : 'opacity-40'}`}>
                                <span className="ml-4">💬</span> <span className="hidden lg:inline">Chambers</span>
                            </button>
                        </nav>
                    </div>

                    <div className="flex-1 flex flex-col bg-[#050507]">
                        <div className="flex-1 flex flex-col overflow-hidden">
                            <header className="p-6 border-b border-white/5 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className={`w-2 h-2 rounded-full ${hasGamepad ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-red-600'}`}></div>
                                    <span className="font-black text-lg italic tracking-tight">Public Chamber</span>
                                </div>
                                <span className="text-[10px] font-black opacity-20 uppercase tracking-[0.2em]">{hasGamepad ? 'Link Active' : 'No Controller'}</span>
                            </header>

                            {/* ULTRA VIBRATION PANEL */}
                            <div className="vibe-panel p-8">
                                <div className="max-w-2xl mx-auto space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                        <div className="flex flex-col gap-3">
                                            <div className="flex justify-between text-[10px] font-black uppercase opacity-40"><span>Heavy Power</span><span>{Math.round(vibeSettings.heavy * 100)}%</span></div>
                                            <input type="range" min="0" max="1" step="0.05" value={vibeSettings.heavy} onChange={e => setVibeSettings({...vibeSettings, heavy: parseFloat(e.target.value)})} />
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <div className="flex justify-between text-[10px] font-black uppercase opacity-40"><span>Light Power</span><span>{Math.round(vibeSettings.light * 100)}%</span></div>
                                            <input type="range" min="0" max="1" step="0.05" value={vibeSettings.light} onChange={e => setVibeSettings({...vibeSettings, light: parseFloat(e.target.value)})} />
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <div className="flex justify-between text-[10px] font-black uppercase opacity-40"><span>Smoothness</span><span>{vibeSettings.speed}ms</span></div>
                                            <input type="range" min="50" max="500" step="10" value={vibeSettings.speed} onChange={e => setVibeSettings({...vibeSettings, speed: parseInt(e.target.value)})} />
                                        </div>
                                    </div>

                                    <div className="flex flex-wrap justify-center gap-6">
                                        <button 
                                            onClick={handleStart} 
                                            className="btn-vibe-start px-14 py-4 rounded-full font-black text-xs uppercase tracking-widest transition-all"
                                        >
                                            Start Constant
                                        </button>
                                        <button 
                                            onClick={handleStop} 
                                            className="btn-vibe-stop px-14 py-4 rounded-full font-black text-xs uppercase tracking-widest transition-all"
                                        >
                                            Emergency Stop
                                        </button>
                                    </div>
                                    <p className="text-center text-[9px] font-bold opacity-20 uppercase tracking-widest italic">Syncing to all controllers in room</p>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-black/20">
                                <div className="text-center p-10 opacity-20 text-xs font-bold uppercase tracking-widest">End-to-End Encrypted Chat</div>
                            </div>

                            <div className="p-6 border-t border-white/5 bg-[#050507]">
                                <div className="max-w-4xl mx-auto flex gap-4">
                                    <input className="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none text-sm" placeholder="Send a message..." />
                                    <button className="bg-purple-600 px-8 rounded-2xl font-black text-xs uppercase italic">Send</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
