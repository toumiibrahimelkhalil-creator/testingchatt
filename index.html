<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | RumbleCTRL Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #08080a; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.15); color: #d500f9; }
        .msg-mine { background: linear-gradient(135deg, #6a1b9a, #4a148c); border-radius: 18px 18px 2px 18px; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 18px 18px 18px 2px; }
        
        /* RumbleCTRL Pro Styles */
        .vibe-panel { background: rgba(213, 0, 249, 0.05); border-bottom: 1px solid rgba(213, 0, 249, 0.2); }
        .vibe-btn-start { background: #d500f9; box-shadow: 0 0 15px rgba(213, 0, 249, 0.4); }
        .vibe-btn-stop { background: #ff1744; box-shadow: 0 0 15px rgba(255, 23, 68, 0.4); }
        .controller-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        input[type=range] { accent-color: #d500f9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('chat'); 
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [text, setText] = useState('');

            // RumbleCTRL Pro States
            const [hasGamepad, setHasGamepad] = useState(false);
            const [isVibrating, setIsVibrating] = useState(false);
            const [intensity, setIntensity] = useState({ heavy: 1.0, light: 1.0, speed: 500 });
            const vibrationInterval = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    fetchProfile();
                    refreshSocial();

                    // Realtime Broadcast Listener
                    const vibeChannel = supabaseClient.channel(`vibe-${currentChat}`)
                        .on('broadcast', { event: 'vibe_control' }, ({ payload }) => {
                            if (payload.action === 'start') {
                                handleVibeStart(payload.settings);
                            } else {
                                handleVibeStop();
                            }
                        })
                        .subscribe();

                    const checkGamepads = () => {
                        const gps = navigator.getGamepads();
                        setHasGamepad(Object.values(gps).some(g => g !== null));
                    };

                    window.addEventListener("gamepadconnected", checkGamepads);
                    window.addEventListener("gamepaddisconnected", checkGamepads);

                    return () => {
                        supabaseClient.removeChannel(vibeChannel);
                        handleVibeStop();
                    };
                }
            }, [session, currentChat]);

            const handleVibeStart = (settings) => {
                setIsVibrating(true);
                if (vibrationInterval.current) clearInterval(vibrationInterval.current);
                
                const trigger = () => {
                    const gps = navigator.getGamepads();
                    for (const gp of gps) {
                        if (gp?.vibrationActuator) {
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0,
                                duration: settings.speed,
                                weakMagnitude: settings.light,
                                strongMagnitude: settings.heavy
                            });
                        }
                    }
                };

                trigger();
                vibrationInterval.current = setInterval(trigger, settings.speed + 50);
            };

            const handleVibeStop = () => {
                setIsVibrating(false);
                if (vibrationInterval.current) clearInterval(vibrationInterval.current);
                vibrationInterval.current = null;
            };

            const broadcastControl = async (action) => {
                const vibeChannel = supabaseClient.channel(`vibe-${currentChat}`);
                await vibeChannel.send({
                    type: 'broadcast',
                    event: 'vibe_control',
                    payload: { action, settings: intensity }
                });
            };

            const fetchProfile = async () => {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                setProfile(data);
            };

            const refreshSocial = async () => {
                const { data: fList } = await supabaseClient.from('friends').select('*, friend:profiles!friends_friend_id_fkey(*), sender:profiles!friends_user_id_fkey(*)').eq('status', 1).or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                setFriends(fList?.map(f => f.user_id === session.user.id ? f.friend : f.sender) || []);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') query = query.is('receiver_id', null);
                else query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                const { data } = await query;
                setMessages(data || []);
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ sender_id: session.user.id, receiver_id: currentChat === 'public' ? null : currentChat, content: text }]);
                setText('');
            };

            useEffect(() => { fetchMessages(); }, [currentChat, session]);

            if (!session) return <div className="p-20 text-center font-black">Please Login...</div>;

            return (
                <div className="flex h-screen">
                    {/* SIDEBAR */}
                    <div className="w-72 glass flex flex-col py-6">
                        <div className="px-6 mb-10">
                            <h1 className="text-2xl font-black text-purple-500 italic">K-D WORLD</h1>
                        </div>
                        <div className="flex-1 space-y-2 px-2">
                            <button onClick={() => setView('chat')} className={`nav-btn w-full p-4 flex items-center gap-4 rounded-xl font-bold ${view === 'chat' ? 'active-tab' : ''}`}>
                                💬 Chambers
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col bg-[#050507]">
                        <div className="flex flex-1 overflow-hidden">
                            <div className="w-64 border-r border-white/5 bg-black/20">
                                <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} className={`w-full p-4 text-left font-bold border-b border-white/5 ${currentChat === 'public' ? 'text-purple-400' : ''}`}>🌐 Public Room</button>
                                {friends.map(f => (
                                    <button key={f.id} onClick={() => {setCurrentChat(f.id); setCurrentChatName(f.username);}} className={`w-full p-4 flex items-center gap-3 text-sm font-medium border-b border-white/5 ${currentChat === f.id ? 'text-purple-400' : ''}`}>
                                        <img src={f.avatar_url || 'https://via.placeholder.com/100'} className="w-6 h-6 rounded-full object-cover" /> {f.username}
                                    </button>
                                ))}
                            </div>

                            <div className="flex-1 flex flex-col">
                                <header className="p-6 border-b border-white/5 font-black text-xl flex items-center gap-3 justify-between">
                                    <div className="flex items-center gap-3">
                                        <span className={`w-3 h-3 rounded-full ${hasGamepad ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-red-500 animate-pulse'}`}></span>
                                        {currentChatName}
                                    </div>
                                    <span className="text-[10px] opacity-40 uppercase tracking-widest">{hasGamepad ? 'Controller Linked' : 'Disconnected'}</span>
                                </header>

                                {/* PRO VIBRATION PANEL */}
                                <div className="vibe-panel p-6 border-b border-white/10">
                                    <div className="max-w-xl mx-auto flex flex-col gap-6">
                                        <div className="grid grid-cols-3 gap-8">
                                            <div className="flex flex-col gap-2">
                                                <label className="text-[10px] font-black opacity-50 uppercase tracking-tighter text-center">Heavy Rumble</label>
                                                <input type="range" min="0" max="1" step="0.1" value={intensity.heavy} onChange={(e) => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} />
                                            </div>
                                            <div className="flex flex-col gap-2">
                                                <label className="text-[10px] font-black opacity-50 uppercase tracking-tighter text-center">Light Rumble</label>
                                                <input type="range" min="0" max="1" step="0.1" value={intensity.light} onChange={(e) => setIntensity({...intensity, light: parseFloat(e.target.value)})} />
                                            </div>
                                            <div className="flex flex-col gap-2">
                                                <label className="text-[10px] font-black opacity-50 uppercase tracking-tighter text-center">Pulse Speed</label>
                                                <input type="range" min="100" max="1000" step="50" value={intensity.speed} onChange={(e) => setIntensity({...intensity, speed: parseInt(e.target.value)})} />
                                            </div>
                                        </div>

                                        <div className="flex justify-center gap-4">
                                            {!isVibrating ? (
                                                <button onClick={() => broadcastControl('start')} className="vibe-btn-start px-12 py-3 rounded-full font-black text-xs uppercase tracking-widest">Start Constant Vibe</button>
                                            ) : (
                                                <button onClick={() => broadcastControl('stop')} className="vibe-btn-stop px-12 py-3 rounded-full font-black text-xs uppercase tracking-widest">Stop All</button>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-1 p-6 overflow-y-auto space-y-4">
                                    {messages.map((msg, i) => (
                                        <div key={i} className={`flex gap-3 ${msg.sender_id === session.user.id ? 'flex-row-reverse' : ''}`}>
                                            <div className={`p-4 rounded-2xl text-sm ${msg.sender_id === session.user.id ? 'msg-mine' : 'msg-theirs'}`}>{msg.content}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="p-6 bg-black/40 border-t border-white/5 flex gap-3">
                                    <input className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 outline-none" placeholder="Message..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                    <button onClick={sendMsg} className="bg-purple-600 px-6 rounded-xl font-bold">SEND</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
