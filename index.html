<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Elite Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #d500f9; --bg: #08080a; --panel: rgba(20, 20, 25, 0.7); }
        .theme-Purple { --accent: #9c27b0; --bg: #120012; }
        .theme-Blue { --accent: #2979ff; --bg: #000a12; }
        .theme-Black { --accent: #616161; --bg: #000000; }

        body { background: var(--bg); color: #e2e2e2; font-family: 'Inter', sans-serif; transition: all 0.4s ease; }
        .glass { background: var(--panel); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); }
        
        /* Role Glows */
        .glow-Dominator { box-shadow: 0 0 15px #ff1744; border: 2px solid #ff1744; }
        .glow-Submissive { box-shadow: 0 0 15px #00e5ff; border: 2px solid #00e5ff; }
        .glow-Switch { box-shadow: 0 0 15px #d500f9; border: 2px solid #d500f9; }

        .active-tab { border-left: 4px solid var(--accent); background: rgba(213, 0, 249, 0.1); color: var(--accent); }
        .msg-mine { background: linear-gradient(135deg, #6a1b9a, #4a148c); border-radius: 18px 18px 2px 18px; }
        .msg-theirs { background: #1e1e24; border-radius: 18px 18px 18px 2px; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-Online { background: #00c853; box-shadow: 0 0 8px #00c853; }
        .status-Away { background: #ffd600; }
        .status-DND { background: #d50000; }

        .announcement-banner { background: linear-gradient(90deg, #d500f933, transparent); border-left: 4px solid #d500f9; }
    </style>
</head>
<body class="theme-Midnight">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('chat');
            const [currentChat, setCurrentChat] = useState('public');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [isBurnMode, setIsBurnMode] = useState(false);
            const [typingUser, setTypingUser] = useState(null);
            const [showMedia, setShowMedia] = useState(false);
            const [text, setText] = useState('');
            
            // 1. AUTH & INITIAL LOAD
            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                // Screenshot Detection Alert
                window.addEventListener('keyup', (e) => { if(e.key === 'PrintScreen') alert("SECURITY ALERT: Screenshot detected in private chamber!"); });
            }, []);

            useEffect(() => {
                if (session) {
                    fetchProfile();
                    syncRealtime();
                }
            }, [session, currentChat]);

            const fetchProfile = async () => {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                setProfile(data);
                document.body.className = `theme-${data.theme || 'Midnight'}`;
            };

            const syncRealtime = () => {
                const channel = supabaseClient.channel('global')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, fetchMessages)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                        fetchFriends();
                        fetchProfile();
                    })
                    .subscribe();
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') query = query.is('receiver_id', null);
                else query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                
                const { data } = await query;
                setMessages(data || []);
                
                // Mark as Read
                if (currentChat !== 'public') {
                    await supabaseClient.from('messages').update({ is_read: true }).eq('receiver_id', session.user.id).eq('sender_id', currentChat);
                }
            };

            const fetchFriends = async () => {
                const { data } = await supabaseClient.from('friends').select('*, friend:profiles!friends_friend_id_fkey(*), sender:profiles!friends_user_id_fkey(*)').eq('status', 1).or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                setFriends(data?.map(f => f.user_id === session.user.id ? f.friend : f.sender) || []);
            };

            const sendMsg = async (fileData = null) => {
                const msgObj = {
                    sender_id: session.user.id,
                    receiver_id: currentChat === 'public' ? null : currentChat,
                    content: text,
                    expires_at: isBurnMode ? new Date(Date.now() + 30000).toISOString() : null, // 30s burn
                    is_announcement: (currentChat === 'public' && profile.role === 'Dominator' && text.length > 50)
                };
                if (fileData) Object.assign(msgObj, fileData);
                await supabaseClient.from('messages').insert([msgObj]);
                setText('');
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-20 lg:w-72 glass flex flex-col py-6">
                        <div className="px-6 mb-8 hidden lg:block font-black text-2xl text-purple-500 italic">K-D WORLD</div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setView('chat')} className={`w-full flex items-center gap-4 p-4 ${view === 'chat' ? 'active-tab' : ''}`}><span>💬</span><span className="hidden lg:block font-bold">Chambers</span></button>
                            <button onClick={() => setView('vault')} className={`w-full flex items-center gap-4 p-4 ${view === 'vault' ? 'active-tab' : ''}`}><span>🔐</span><span className="hidden lg:block font-bold">Vault</span></button>
                            <button onClick={() => setView('settings')} className={`w-full flex items-center gap-4 p-4 ${view === 'settings' ? 'active-tab' : ''}`}><span>⚙️</span><span className="hidden lg:block font-bold">Settings</span></button>
                        </nav>
                        <div className="p-4 border-t border-white/5">
                            <div className="flex items-center gap-3">
                                <img src={profile?.avatar_url} className={`w-10 h-10 rounded-full glow-${profile?.role}`} />
                                <div className="hidden lg:block">
                                    <p className="text-xs font-bold">{profile?.username}</p>
                                    <div className={`status-dot status-${profile?.status}`}></div> <span className="text-[10px] opacity-50">{profile?.status}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Area */}
                    <div className="flex-1 flex flex-col relative">
                        {view === 'chat' && (
                            <div className="flex flex-1 overflow-hidden">
                                <div className="w-64 border-r border-white/5 hidden lg:flex flex-col p-4 space-y-4">
                                    <p className="text-[10px] font-black opacity-30 uppercase tracking-widest">Active Friends</p>
                                    {friends.map(f => (
                                        <div key={f.id} onClick={() => setCurrentChat(f.id)} className="flex items-center gap-3 cursor-pointer p-2 hover:bg-white/5 rounded-xl transition">
                                            <div className="relative">
                                                <img src={f.avatar_url} className="w-8 h-8 rounded-full" />
                                                <div className={`absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-black status-${f.status}`}></div>
                                            </div>
                                            <span className="text-sm font-medium">{f.username}</span>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="flex-1 flex flex-col">
                                    <header className="p-6 border-b border-white/5 flex justify-between items-center">
                                        <h2 className="font-black text-xl"># {currentChat === 'public' ? 'Public Chamber' : 'Private Session'}</h2>
                                        <div className="flex gap-4 items-center">
                                            <button onClick={() => setShowMedia(!showMedia)} className="text-xs font-bold opacity-50">🖼️ Gallery</button>
                                            <button onClick={() => setIsBurnMode(!isBurnMode)} className={`text-xs font-bold px-3 py-1 rounded-full ${isBurnMode ? 'bg-red-600' : 'bg-white/10'}`}>🔥 Burn: {isBurnMode ? 'ON' : 'OFF'}</button>
                                        </div>
                                    </header>

                                    <div className="flex-1 p-6 overflow-y-auto space-y-6">
                                        {messages.map((msg, i) => {
                                            const isMine = msg.sender_id === session.user.id;
                                            const isExpired = msg.expires_at && new Date(msg.expires_at) < new Date();
                                            if (isExpired) return null;

                                            return (
                                                <div key={i} className={`flex gap-3 ${isMine ? 'flex-row-reverse' : 'flex-row'} ${msg.is_announcement ? 'announcement-banner p-4 rounded-xl' : ''}`}>
                                                    <img src={msg.profiles?.avatar_url} className={`w-10 h-10 rounded-full glow-${msg.profiles?.role}`} />
                                                    <div className={`max-w-[70%] p-4 ${isMine ? 'msg-mine' : 'msg-theirs'}`}>
                                                        {msg.file_url ? (
                                                            msg.file_type === 'image' ? <img src={msg.file_url} className="rounded-lg max-w-xs" /> : 
                                                            msg.file_type === 'video' ? <video src={msg.file_url} controls className="rounded-lg max-w-xs" /> : 
                                                            <audio src={msg.file_url} controls className="w-48" />
                                                        ) : <p className="text-sm">{msg.content}</p>}
                                                        <div className="flex justify-between items-center mt-2 opacity-30 text-[9px]">
                                                            <span>{msg.profiles?.username}</span>
                                                            {isMine && <span>{msg.is_read ? '✔️✔️' : '✔️'}</span>}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Input */}
                                    <div className="p-6">
                                        <div className="max-w-4xl mx-auto flex gap-3 bg-white/5 p-2 rounded-2xl border border-white/10 items-center">
                                            <button className="p-2 hover:bg-white/10 rounded-xl">🎤</button>
                                            <input className="flex-1 bg-transparent px-4 py-2 outline-none" placeholder="Message..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                            <button onClick={() => sendMsg()} className="bg-purple-600 px-6 py-2 rounded-xl font-black text-xs">SEND</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="flex-1 p-10 max-w-2xl mx-auto w-full space-y-10">
                                <h2 className="text-3xl font-black">Elite Settings</h2>
                                <div className="space-y-4">
                                    <label className="text-xs font-bold opacity-40 uppercase">Status Indicator</label>
                                    <div className="flex gap-2">
                                        {['Online', 'Away', 'DND'].map(s => (
                                            <button key={s} onClick={() => supabaseClient.from('profiles').update({ status: s }).eq('id', session.user.id)} className={`px-4 py-2 rounded-xl border border-white/10 ${profile.status === s ? 'bg-purple-600' : ''}`}>{s}</button>
                                        ))}
                                    </div>
                                    
                                    <label className="text-xs font-bold opacity-40 uppercase">Interface Theme</label>
                                    <div className="flex gap-2">
                                        {['Midnight', 'Purple', 'Blue', 'Black'].map(t => (
                                            <button key={t} onClick={() => supabaseClient.from('profiles').update({ theme: t }).eq('id', session.user.id)} className={`px-4 py-2 rounded-xl border border-white/10 ${profile.theme === t ? 'bg-purple-600' : ''}`}>{t}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* Media Gallery Overlay */}
                        {showMedia && (
                            <div className="absolute right-0 top-0 w-80 h-full glass p-6 z-50 overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black tracking-tighter uppercase">Chamber Media</h3>
                                    <button onClick={() => setShowMedia(false)}>✕</button>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    {messages.filter(m => m.file_url).map((m, i) => (
                                        <img key={i} src={m.file_url} className="w-full aspect-square object-cover rounded-lg" />
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '', role: 'Switch' });
            const [loading, setLoading] = useState(false);

            const handleAction = async () => {
                setLoading(true);
                try {
                    if (mode === 'signup') {
                        // 1. Create the Auth User
                        const { data, error: authError } = await supabaseClient.auth.signUp({ 
                            email: form.email, 
                            password: form.password 
                        });
                        
                        if (authError) throw authError;

                        if (data.user) {
                            // 2. Create the Database Profile
                            const { error: profileError } = await supabaseClient.from('profiles').insert([{ 
                                id: data.user.id, 
                                username: form.username, 
                                role: form.role,
                                status: 'Online',
                                theme: 'Midnight'
                            }]);
                            if (profileError) throw profileError;
                            alert("Signup successful! Check your email for verification.");
                        }
                    } else {
                        // Login Logic
                        const { error: loginError } = await supabaseClient.auth.signInWithPassword({ 
                            email: form.email, 
                            password: form.password 
                        });
                        if (loginError) throw loginError;
                        
                        // Force reload to trigger useEffect and enter the app
                        window.location.reload();
                    }
                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm border border-white/10 text-center">
                        <h1 className="text-4xl font-black text-purple-500 italic mb-10 tracking-tighter">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && (
                                <>
                                    <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />
                                    <select className="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs font-bold text-white" onChange={e => setForm({...form, role: e.target.value})}>
                                        <option value="Switch">Role: Switch</option>
                                        <option value="Dominator">Role: Dominator</option>
                                        <option value="Submissive">Role: Submissive</option>
                                    </select>
                                </>
                            )}
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-xs" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-xs" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            
                            <button 
                                onClick={handleAction} 
                                disabled={loading}
                                className="w-full bg-purple-600 p-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-purple-500 transition disabled:opacity-50"
                            >
                                {loading ? 'Processing...' : mode}
                            </button>
                            
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-center text-[10px] opacity-40 cursor-pointer mt-4 uppercase font-bold">
                                Switch to {mode === 'login' ? 'Signup' : 'Login'}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
