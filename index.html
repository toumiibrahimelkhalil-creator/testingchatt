<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Secure Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.1); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.1); color: #d500f9; }
        .msg-mine { background: #4a148c; border-radius: 12px 12px 0 12px; align-self: flex-end; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 12px 12px 12px 0; align-self: flex-start; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [requests, setRequests] = useState([]);
            const [text, setText] = useState('');
            const [searchUsername, setSearchUsername] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    fetchProfile();
                    refreshSocial();
                    
                    const channel = supabaseClient.channel('social-sync')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => refreshSocial())
                        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => fetchMessages())
                        .subscribe();

                    return () => supabaseClient.removeChannel(channel);
                }
            }, [session, currentChat]);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const fetchProfile = async () => {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                setProfile(data);
            };

            const refreshSocial = () => {
                fetchFriends();
                fetchRequests();
            };

            const fetchFriends = async () => {
                // Get all rows where status is 1 and I am either sender OR receiver
                const { data } = await supabaseClient.from('friends')
                    .select('*, sender:profiles!friends_user_id_fkey(*), receiver:profiles!friends_friend_id_fkey(*)')
                    .eq('status', 1)
                    .or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                
                if (data) {
                    const cleanList = data.map(f => f.user_id === session.user.id ? f.receiver : f.sender);
                    setFriends(cleanList);
                }
            };

            const fetchRequests = async () => {
                // Get rows where status is 0 and I am the friend_id (the receiver)
                const { data } = await supabaseClient.from('friends')
                    .select('*, sender:profiles!friends_user_id_fkey(*)')
                    .eq('friend_id', session.user.id)
                    .eq('status', 0);
                setRequests(data || []);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') {
                    query = query.is('receiver_id', null);
                } else {
                    query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                }
                const { data } = await query;
                setMessages(data || []);
            };

            const handleAddFriend = async () => {
                const { data: target } = await supabaseClient.from('profiles').select('id').eq('username', searchUsername).single();
                if (!target) return alert("User not found");
                if (target.id === session.user.id) return alert("You can't add yourself!");

                const { error } = await supabaseClient.from('friends').insert([{ 
                    user_id: session.user.id, 
                    friend_id: target.id, 
                    status: 0 
                }]);
                
                if (error) alert("Request already exists");
                else { alert("Request sent!"); setSearchUsername(''); }
            };

            const handleAccept = async (id) => {
                await supabaseClient.from('friends').update({ status: 1 }).eq('id', id);
                refreshSocial();
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ 
                    sender_id: session.user.id, 
                    receiver_id: currentChat === 'public' ? null : currentChat, 
                    content: text 
                }]);
                setText('');
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-80 glass flex flex-col border-r border-white/10">
                        <div className="p-6 border-b border-white/10">
                            <h1 className="text-xl font-black text-purple-500 italic">K-D WORLD</h1>
                            <p className="text-[10px] mt-1 opacity-40">SECURE MESH NETWORK</p>
                        </div>

                        <div className="flex-1 overflow-y-auto">
                            <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} 
                                className={`w-full p-4 text-left font-bold border-b border-white/5 transition ${currentChat === 'public' ? 'active-tab' : 'hover:bg-white/5'}`}>
                                🌐 Public Chamber
                            </button>

                            {/* REQUESTS AREA (This will now pop up when someone adds you) */}
                            {requests.length > 0 && (
                                <div className="p-4 bg-purple-900/20 border-b border-purple-500/30">
                                    <p className="text-[10px] font-black text-purple-400 mb-3 uppercase tracking-widest">Incoming Requests</p>
                                    {requests.map(req => (
                                        <div key={req.id} className="flex items-center justify-between bg-black/40 p-2 rounded-lg border border-purple-500/20 mb-2">
                                            <span className="text-xs font-bold">{req.sender?.username}</span>
                                            <button onClick={() => handleAccept(req.id)} className="bg-purple-600 text-[10px] px-3 py-1 rounded font-black hover:bg-purple-500">ACCEPT</button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="p-4">
                                <p className="text-[10px] font-bold opacity-30 mb-3 uppercase tracking-widest">Direct Messages</p>
                                {friends.map(f => (
                                    <button key={f.id} onClick={() => {setCurrentChat(f.id); setCurrentChatName(f.username);}}
                                        className={`w-full p-3 text-left rounded-xl mb-1 flex items-center gap-3 transition ${currentChat === f.id ? 'bg-purple-600/20 text-purple-400 border border-purple-500/30' : 'hover:bg-white/5'}`}>
                                        <div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
                                        <span className="text-sm font-bold">{f.username}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="p-4 border-t border-white/10 bg-black/20">
                            <div className="flex gap-2">
                                <input className="flex-1 bg-black border border-white/10 rounded-lg px-3 py-2 text-xs focus:border-purple-500 outline-none transition" placeholder="Add by username..." value={searchUsername} onChange={e => setSearchUsername(e.target.value)} />
                                <button onClick={handleAddFriend} className="bg-purple-600 px-4 rounded-lg font-bold hover:bg-purple-500">+</button>
                            </div>
                        </div>
                    </div>

                    {/* Chat Window */}
                    <div className="flex-1 flex flex-col bg-[#08080a]">
                        <header className="p-5 border-b border-white/5 flex items-center justify-between bg-black/40 backdrop-blur-md">
                            <h2 className="font-bold tracking-tight">{currentChatName}</h2>
                            <div className="flex items-center gap-2 text-[10px] opacity-30 font-mono">
                                <span className="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></span>
                                ENCRYPTED CHANNEL
                            </div>
                        </header>

                        <div className="flex-1 p-6 overflow-y-auto flex flex-col gap-4">
                            {messages.map((msg, i) => {
                                const isMine = msg.sender_id === session.user.id;
                                return (
                                    <div key={i} className={`flex flex-col ${isMine ? 'items-end' : 'items-start'} max-w-[80%] ${isMine ? 'ml-auto' : 'mr-auto'}`}>
                                        <span className="text-[10px] opacity-20 mb-1 px-1">{msg.profiles?.username}</span>
                                        <div className={`p-3 px-4 shadow-xl ${isMine ? 'msg-mine' : 'msg-theirs'}`}>
                                            <p className="text-sm">{msg.content}</p>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-6">
                            <div className="max-w-4xl mx-auto flex gap-3 bg-white/5 p-2 rounded-2xl border border-white/10 shadow-2xl">
                                <input className="flex-1 bg-transparent px-4 py-2 focus:outline-none" placeholder="Write a message..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                <button onClick={sendMsg} className="bg-purple-600 hover:bg-purple-500 px-8 py-3 rounded-xl font-black text-xs tracking-widest transition transform active:scale-95 shadow-lg shadow-purple-900/20">SEND</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data, error } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username }]);
                    if (error) alert(error.message); else alert("Check email or login!");
                } else {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
                    if (error) alert(error.message);
                }
            };
            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="w-full max-w-sm p-10 glass rounded-[2.5rem] border border-white/5 text-center">
                        <h1 className="text-3xl font-black text-purple-500 italic mb-8">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />}
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-4 rounded-2xl font-black tracking-widest hover:bg-purple-500 transition shadow-lg shadow-purple-900/40">{mode.toUpperCase()}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-xs opacity-40 cursor-pointer mt-4 uppercase font-bold tracking-tighter hover:opacity-100 transition">Switch to {mode === 'login' ? 'Signup' : 'Login'}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
