<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Full Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #08080a; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.15); color: #d500f9; }
        input[type=range] { accent-color: #d500f9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [view, setView] = useState('chat'); 
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [receivedRequests, setReceivedRequests] = useState([]);
            const [text, setText] = useState('');
            const [intensity, setIntensity] = useState({ heavy: 1.0, light: 1.0 });
            const vibeInterval = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    refreshSocial();
                    const sub = supabaseClient.channel('global')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => fetchMessages())
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => refreshSocial())
                        .subscribe();
                    return () => supabaseClient.removeChannel(sub);
                }
            }, [session, currentChat]);

            const refreshSocial = async () => {
                if (!session) return;
                const { data: fList } = await supabaseClient.from('friends').select('*, sender:profiles!friends_user_id_fkey(*), receiver:profiles!friends_friend_id_fkey(*)').eq('status', 1).or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                const { data: rList } = await supabaseClient.from('friends').select('*, sender:profiles!friends_user_id_fkey(*)').eq('friend_id', session.user.id).eq('status', 0);
                setFriends(fList?.map(f => f.user_id === session.user.id ? f.receiver : f.sender) || []);
                setReceivedRequests(rList || []);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') query = query.is('receiver_id', null);
                else query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                const { data } = await query;
                setMessages(data || []);
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ sender_id: session.user.id, receiver_id: currentChat === 'public' ? null : currentChat, content: text }]);
                setText('');
            };

            const respondRequest = async (id, accept) => {
                if (accept) await supabaseClient.from('friends').update({ status: 1 }).eq('id', id);
                else await supabaseClient.from('friends').delete().eq('id', id);
                refreshSocial();
            };

            // AGGRESSIVE VIBRATION FOR IOS/BLUETOOTH
            const startVibration = () => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);

                // Immediate iPhone Haptic Kick
                if (navigator.vibrate) navigator.vibrate(100);

                vibeInterval.current = setInterval(() => {
                    const pads = navigator.getGamepads();
                    for (let gp of pads) {
                        if (gp && gp.vibrationActuator) {
                            // Dual Rumble attempt
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0,
                                duration: 300,
                                weakMagnitude: intensity.light,
                                strongMagnitude: intensity.heavy
                            }).catch(() => {
                                // Safari sometimes needs a simpler pulse
                                if (navigator.vibrate) navigator.vibrate(200);
                            });
                        }
                    }
                }, 200);
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <div className="w-72 glass flex flex-col py-10">
                        <div className="px-8 mb-10 text-2xl font-black italic text-purple-500">K-D WORLD</div>
                        <nav className="flex-1">
                            <button onClick={() => setView('chat')} className={`w-full p-4 flex gap-4 items-center ${view === 'chat' ? 'active-tab' : ''}`}>💬 <b>Chambers</b></button>
                            <button onClick={() => setView('social')} className={`w-full p-4 flex gap-4 items-center ${view === 'social' ? 'active-tab' : ''}`}>👥 <b>Social Hub</b></button>
                            <button onClick={() => setView('vibe')} className={`w-full p-4 flex gap-4 items-center ${view === 'vibe' ? 'active-tab' : ''}`}>🎮 <b>Controller</b></button>
                        </nav>
                        <button onClick={() => supabaseClient.auth.signOut()} className="m-6 bg-red-600/10 text-red-500 p-3 rounded-xl font-bold text-xs uppercase">Logout</button>
                    </div>

                    {/* MAIN */}
                    <main className="flex-1 flex flex-col bg-black/40">
                        {view === 'chat' && (
                            <div className="flex h-full">
                                <div className="w-64 border-r border-white/5 p-4 space-y-2">
                                    <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} className={`w-full p-4 rounded-xl text-left font-bold ${currentChat === 'public' ? 'bg-purple-600' : ''}`}>🌐 Public</button>
                                    {friends.map(f => (
                                        <button key={f.id} onClick={() => {setCurrentChat(f.id); setCurrentChatName(f.username);}} className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold ${currentChat === f.id ? 'bg-white/10' : ''}`}>
                                            <img src={f.avatar_url || 'https://via.placeholder.com/50'} className="w-8 h-8 rounded-full" /> {f.username}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex-1 flex flex-col">
                                    <header className="p-6 border-b border-white/5 font-black text-xl italic">{currentChatName}</header>
                                    <div className="flex-1 p-6 overflow-y-auto space-y-4">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.sender_id === session.user.id ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`p-4 rounded-2xl max-w-sm ${m.sender_id === session.user.id ? 'bg-purple-600' : 'bg-white/5'}`}>{m.content}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-6 flex gap-2">
                                        <input className="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                        <button onClick={sendMsg} className="bg-purple-600 px-8 rounded-2xl font-black">SEND</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'social' && (
                            <div className="p-12 max-w-4xl mx-auto w-full space-y-10">
                                <h2 className="text-4xl font-black italic">SOCIAL HUB</h2>
                                <div className="grid grid-cols-2 gap-8">
                                    <section className="space-y-4">
                                        <h3 className="text-xs font-black opacity-30 uppercase">Requests</h3>
                                        {receivedRequests.map(r => (
                                            <div key={r.id} className="p-5 glass rounded-2xl flex justify-between items-center">
                                                <span className="font-bold">{r.sender?.username}</span>
                                                <div className="flex gap-2">
                                                    <button onClick={() => respondRequest(r.id, true)} className="bg-green-500 text-white px-3 py-1 rounded text-[10px] font-bold">ACCEPT</button>
                                                    <button onClick={() => respondRequest(r.id, false)} className="bg-red-500 text-white px-3 py-1 rounded text-[10px] font-bold">DECLINE</button>
                                                </div>
                                            </div>
                                        ))}
                                    </section>
                                    <section className="space-y-4">
                                        <h3 className="text-xs font-black opacity-30 uppercase">Friends</h3>
                                        {friends.map(f => (
                                            <div key={f.id} className="p-4 glass rounded-2xl flex justify-between items-center">
                                                <span>{f.username}</span>
                                                <button onClick={() => {setView('chat'); setCurrentChat(f.id);}} className="bg-purple-600 p-2 rounded-lg text-xs">CHAT</button>
                                            </div>
                                        ))}
                                    </section>
                                </div>
                            </div>
                        )}

                        {view === 'vibe' && (
                            <div className="h-full flex items-center justify-center p-6">
                                <div className="p-12 glass rounded-[3rem] w-full max-w-xl text-center space-y-8">
                                    <h2 className="text-3xl font-black text-purple-500">VIBRATION CONSOLE</h2>
                                    <div className="space-y-4">
                                        <input type="range" min="0" max="1" step="0.1" className="w-full" value={intensity.heavy} onChange={e => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} />
                                        <p className="text-xs opacity-50 font-bold uppercase tracking-widest">Rumble Intensity</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={startVibration} className="flex-1 bg-purple-600 py-6 rounded-3xl font-black tracking-widest">TEST VIBRATION</button>
                                        <button onClick={() => clearInterval(vibeInterval.current)} className="flex-1 bg-white/5 py-6 rounded-3xl font-black uppercase text-xs">Stop</button>
                                    </div>
                                    <div className="text-[10px] opacity-30 uppercase font-bold space-y-1">
                                        <p>1. Connect PS4 via Bluetooth in Settings</p>
                                        <p>2. Tap screen once to enable audio/haptics</p>
                                        <p>3. If controller doesn't shake, iPhone will vibrate instead</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username }]);
                } else await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
            };
            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="p-12 glass border border-white/10 text-center w-full max-w-sm rounded-[3rem]">
                        <h1 className="text-3xl font-black text-purple-500 italic mb-10 tracking-tighter">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />}
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest">{mode}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-[10px] cursor-pointer mt-4 uppercase opacity-50 font-bold">Switch to {mode === 'login' ? 'Signup' : 'Login'}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
