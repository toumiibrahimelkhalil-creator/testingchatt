<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Secure Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.1); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.1); color: #d500f9; }
        .msg-mine { background: #4a148c; border-radius: 12px 12px 0 12px; align-self: flex-end; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 12px 12px 12px 0; align-self: flex-start; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [requests, setRequests] = useState([]);
            const [text, setText] = useState('');
            const [searchUsername, setSearchUsername] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    fetchProfile();
                    fetchFriends();
                    fetchRequests();
                    
                    // Realtime Listeners
                    const msgChannel = supabaseClient.channel('db-changes')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => fetchMessages())
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => { fetchFriends(); fetchRequests(); })
                        .subscribe();

                    return () => supabaseClient.removeChannel(msgChannel);
                }
            }, [session, currentChat]);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const fetchProfile = async () => {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                setProfile(data);
            };

            const fetchFriends = async () => {
                // Fetch friends where I am user_id OR friend_id and status is 1 (Accepted)
                const { data } = await supabaseClient.from('friends')
                    .select('*, user:profiles!friends_user_id_fkey(*), friend:profiles!friends_friend_id_fkey(*)')
                    .or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`)
                    .eq('status', 1);
                
                if (data) {
                    const processed = data.map(f => f.user_id === session.user.id ? f.friend : f.user);
                    setFriends(processed);
                }
            };

            const fetchRequests = async () => {
                const { data } = await supabaseClient.from('friends')
                    .select('*, profiles!friends_user_id_fkey(*)')
                    .eq('friend_id', session.user.id)
                    .eq('status', 0);
                setRequests(data || []);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                
                if (currentChat === 'public') {
                    query = query.is('receiver_id', null);
                } else {
                    query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                }
                
                const { data } = await query;
                setMessages(data || []);
            };

            const handleAddFriend = async () => {
                const { data: target } = await supabaseClient.from('profiles').select('id').eq('username', searchUsername).single();
                if (!target) return alert("User not found");
                
                const { error } = await supabaseClient.from('friends').insert([{ user_id: session.user.id, friend_id: target.id, status: 0 }]);
                if (error) alert("Already sent or error");
                else alert("Request sent!");
                setSearchUsername('');
            };

            const handleAccept = async (id) => {
                await supabaseClient.from('friends').update({ status: 1 }).eq('id', id);
                fetchRequests();
                fetchFriends();
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ 
                    sender_id: session.user.id, 
                    receiver_id: currentChat === 'public' ? null : currentChat, 
                    content: text 
                }]);
                setText('');
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-80 glass flex flex-col border-r border-white/10">
                        <div className="p-6 border-b border-white/10">
                            <h1 className="text-xl font-black text-purple-500 italic">K-D WORLD</h1>
                            <div className="mt-4 flex items-center gap-3 bg-white/5 p-2 rounded-lg">
                                <div className="w-10 h-10 rounded-full bg-purple-900 flex items-center justify-center text-xs">
                                    {profile?.username?.[0]}
                                </div>
                                <span className="font-bold text-sm">{profile?.username}</span>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto">
                            <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} 
                                className={`w-full p-4 text-left font-bold border-b border-white/5 transition ${currentChat === 'public' ? 'active-tab' : 'hover:bg-white/5'}`}>
                                🌐 Public Chamber
                            </button>

                            {/* Friend Requests Section */}
                            <div className="p-4 border-b border-white/5 bg-purple-900/10">
                                <p className="text-[10px] font-bold opacity-50 mb-3 tracking-widest uppercase">Pending Requests ({requests.length})</p>
                                {requests.map(req => (
                                    <div key={req.id} className="flex items-center justify-between bg-black/40 p-2 rounded mb-2 border border-white/5">
                                        <span className="text-xs font-bold">{req.profiles.username}</span>
                                        <button onClick={() => handleAccept(req.id)} className="bg-green-600 text-[10px] px-2 py-1 rounded font-bold">ACCEPT</button>
                                    </div>
                                ))}
                            </div>

                            <div className="p-4">
                                <p className="text-[10px] font-bold opacity-50 mb-3 tracking-widest uppercase">Direct Messages</p>
                                {friends.map(friend => (
                                    <button 
                                        key={friend.id} 
                                        onClick={() => {setCurrentChat(friend.id); setCurrentChatName(friend.username);}}
                                        className={`w-full p-3 text-left rounded-lg mb-1 flex items-center gap-3 transition ${currentChat === friend.id ? 'bg-purple-600/20 text-purple-400 border border-purple-500/30' : 'hover:bg-white/5'}`}>
                                        <div className="w-2 h-2 rounded-full bg-green-500"></div>
                                        <span className="text-sm font-medium">{friend.username}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="p-4 border-t border-white/10">
                            <div className="flex gap-2">
                                <input className="flex-1 bg-black/40 border border-white/10 rounded px-3 py-2 text-xs" placeholder="Add by username..." value={searchUsername} onChange={e => setSearchUsername(e.target.value)} />
                                <button onClick={handleAddFriend} className="bg-purple-600 px-3 rounded text-lg">+</button>
                            </div>
                            <button onClick={() => supabaseClient.auth.signOut()} className="w-full mt-4 text-[10px] opacity-40 hover:opacity-100 uppercase font-bold tracking-widest">Logout</button>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 flex flex-col relative bg-[#0a0a0c]">
                        <header className="p-5 border-b border-white/5 flex items-center justify-between bg-black/20 backdrop-blur-md">
                            <div className="flex items-center gap-3">
                                <div className="w-3 h-3 rounded-full bg-purple-500 shadow-[0_0_10px_#d500f9]"></div>
                                <h2 className="font-bold tracking-tight">{currentChatName}</h2>
                            </div>
                            <span className="text-[10px] opacity-40 font-mono">E2E ENCRYPTED SESSION</span>
                        </header>

                        <div className="flex-1 p-6 overflow-y-auto flex flex-col gap-4">
                            {messages.map((msg, i) => {
                                const isMine = msg.sender_id === session.user.id;
                                return (
                                    <div key={i} className={`flex flex-col ${isMine ? 'items-end' : 'items-start'} max-w-[80%] ${isMine ? 'ml-auto' : 'mr-auto'}`}>
                                        <span className="text-[10px] opacity-30 mb-1 px-1">{msg.profiles?.username}</span>
                                        <div className={`p-3 px-4 shadow-xl ${isMine ? 'msg-mine' : 'msg-theirs'}`}>
                                            <p className="text-sm leading-relaxed">{msg.content}</p>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-6 bg-gradient-to-t from-black to-transparent">
                            <div className="max-w-4xl mx-auto flex gap-3">
                                <input 
                                    className="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500 transition shadow-inner" 
                                    placeholder={`Message ${currentChatName}...`} 
                                    value={text} 
                                    onChange={e => setText(e.target.value)} 
                                    onKeyDown={e => e.key === 'Enter' && sendMsg()} 
                                />
                                <button onClick={sendMsg} className="bg-purple-600 hover:bg-purple-500 px-8 rounded-2xl font-black text-xs tracking-widest transition-all transform active:scale-95 shadow-lg shadow-purple-900/20">SEND</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* AuthUI remains the same logic as before but with consistent styling */
        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '', role: 'Switch' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data, error } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username, role: form.role }]);
                    if (error) alert(error.message); else alert("Check email or login!");
                } else {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
                    if (error) alert(error.message);
                }
            };

            return (
                <div className="h-screen flex items-center justify-center bg-[#050505]">
                    <div className="w-full max-w-sm p-10 glass rounded-[2rem] border border-white/5 shadow-2xl text-center">
                        <h1 className="text-4xl font-black italic mb-8 text-purple-500 tracking-tighter">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && (
                                <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />
                            )}
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-4 rounded-2xl font-black tracking-widest shadow-lg shadow-purple-900/40">{mode.toUpperCase()}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-xs opacity-40 cursor-pointer hover:opacity-100 transition mt-4">
                                {mode === 'login' ? "CREATE AN ACCOUNT" : "ALREADY HAVE AN ACCOUNT?"}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
