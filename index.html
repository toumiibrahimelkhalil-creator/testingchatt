<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Private & Secure</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.1); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.1); }
        .msg-mine { background: #4a148c; border-radius: 12px 12px 0 12px; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 12px 12px 12px 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // FIXED: Renamed variable from 'supabase' to 'supabaseClient' to avoid library conflict
        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [text, setText] = useState('');
            const [searchUsername, setSearchUsername] = useState('');
            const chatEndRef = useRef(null);

            // 1. Session Management
            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
                return () => subscription.unsubscribe();
            }, []);

            // 2. Load User Data
            useEffect(() => {
                if (session) {
                    fetchProfile();
                    fetchFriends();
                }
            }, [session]);

            // 3. Load Messages & Setup Realtime
            useEffect(() => {
                if (session) {
                    fetchMessages();
                    
                    // FIXED: Realtime listener for instant message updates
                    const channel = supabaseClient.channel('realtime:messages')
                        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                            fetchMessages(); 
                        }).subscribe();

                    return () => supabaseClient.removeChannel(channel);
                }
            }, [currentChat, session]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const fetchProfile = async () => {
                const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                if (data) setProfile(data);
            };

            const fetchFriends = async () => {
                const { data } = await supabaseClient
                    .from('friends')
                    .select('friend_id, profiles!friends_friend_id_fkey(username, role)')
                    .eq('user_id', session.user.id);
                if (data) setFriends(data);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(username, role)').order('created_at', { ascending: true });
                
                if (currentChat === 'public') {
                    query = query.is('receiver_id', null);
                } else {
                    query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                }
                
                const { data, error } = await query;
                if (data) setMessages(data);
            };

            const handleAddFriend = async () => {
                if (!searchUsername || !profile) return;
                if (searchUsername === profile.username) return alert("You can't add yourself!");
                
                const { data: userToAdd } = await supabaseClient.from('profiles').select('id, username').eq('username', searchUsername).single();
                
                if (!userToAdd) return alert("Username not found.");

                const { error } = await supabaseClient.from('friends').insert({ 
                    user_id: session.user.id, 
                    friend_id: userToAdd.id, 
                    status: 1 
                });

                if (error) alert("Error adding friend or already added.");
                else {
                    alert(`${userToAdd.username} added!`);
                    setSearchUsername('');
                    fetchFriends();
                }
            };

            const sendMsg = async () => {
                if (!text.trim() || !session) return;
                const msg = {
                    sender_id: session.user.id,
                    receiver_id: currentChat === 'public' ? null : currentChat,
                    content: text
                };
                const { error } = await supabaseClient.from('messages').insert([msg]);
                if (error) console.error(error);
                setText('');
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen">
                    <div className="w-72 glass flex flex-col shadow-2xl z-10">
                        <div className="p-6 font-black italic text-2xl tracking-tighter border-b border-white/10 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-500">
                            K-D WORLD
                        </div>
                        
                        <div className="flex-1 overflow-y-auto">
                            <button 
                                onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}}
                                className={`w-full p-4 text-left font-bold transition ${currentChat === 'public' ? 'active-tab' : 'hover:bg-white/5'}`}
                            >
                                🌐 Public Chamber
                            </button>
                            
                            <div className="p-4 mt-2">
                                <div className="text-[10px] uppercase font-bold opacity-40 mb-2">Add Friend</div>
                                <div className="flex gap-2">
                                    <input 
                                        className="w-full bg-black/40 border border-white/10 rounded px-2 py-1 text-xs focus:outline-none"
                                        placeholder="Username..."
                                        value={searchUsername}
                                        onChange={(e) => setSearchUsername(e.target.value)}
                                    />
                                    <button onClick={handleAddFriend} className="bg-purple-600 px-3 py-1 rounded text-xs font-bold">+</button>
                                </div>
                            </div>

                            <div className="p-4 text-[10px] uppercase font-bold opacity-40 border-t border-white/10 mt-2">Private DMs</div>
                            {friends.map((f, i) => (
                                <button 
                                    key={i}
                                    onClick={() => {setCurrentChat(f.friend_id); setCurrentChatName(f.profiles.username);}}
                                    className={`w-full p-3 text-left transition flex items-center justify-between ${currentChat === f.friend_id ? 'active-tab' : 'hover:bg-white/5'}`}
                                >
                                    <span className="font-bold">{f.profiles?.username}</span>
                                    <span className="text-[10px] px-2 py-0.5 rounded bg-white/10">{f.profiles?.role[0]}</span>
                                </button>
                            ))}
                        </div>

                        <div className="p-4 border-t border-white/10 flex justify-between items-center bg-black/20">
                            <div className="text-xs">User: <span className="font-bold text-purple-400">{profile?.username || 'Loading...'}</span></div>
                            <button onClick={() => supabaseClient.auth.signOut()} className="text-[10px] bg-red-600/20 text-red-400 px-2 py-1 rounded">Logout</button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col bg-black/40 relative">
                        <header className="p-4 border-b border-white/5 flex justify-between items-center bg-black/40 backdrop-blur-md absolute top-0 w-full z-10">
                            <h3 className="font-bold text-lg">{currentChatName}</h3>
                            <span className="text-xs text-green-400 animate-pulse">● Live Connection</span>
                        </header>

                        <div className="flex-1 p-6 pt-20 overflow-y-auto space-y-4">
                            {messages.map((msg, i) => {
                                const isMine = msg.sender_id === session.user.id;
                                return (
                                    <div key={i} className={`flex flex-col ${isMine ? 'items-end' : 'items-start'}`}>
                                        <div className="text-[10px] opacity-50 mb-1 px-1 flex gap-2">
                                            <span>{msg.profiles?.username}</span>
                                            <span className="text-purple-400">[{msg.profiles?.role}]</span>
                                        </div>
                                        <div className={`p-3 max-w-md shadow-lg ${isMine ? 'msg-mine' : 'msg-theirs'}`}>
                                            {msg.content}
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-4 bg-black/60 border-t border-white/10">
                            <div className="flex gap-2 max-w-5xl mx-auto">
                                <input 
                                    className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500"
                                    placeholder="Type a message..."
                                    value={text}
                                    onChange={(e) => setText(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && sendMsg()}
                                />
                                <button onClick={sendMsg} className="bg-purple-600 px-8 rounded-xl font-bold">SEND</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '', role: 'Switch' });
            const [loading, setLoading] = useState(false);

            const handleAction = async () => {
                setLoading(true);
                try {
                    if (mode === 'signup') {
                        const { data, error } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                        if (error) throw error;
                        if (data.user) {
                            // FIXED: Explicitly insert profile immediately upon signup
                            const { error: pError } = await supabaseClient.from('profiles').insert([{ 
                                id: data.user.id, 
                                username: form.username, 
                                role: form.role 
                            }]);
                            if (pError) throw pError;
                            alert("Signup successful! Log in now.");
                            setMode('login');
                        }
                    } else {
                        const { error } = await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
                        if (error) throw error;
                    }
                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#0a0a0c]">
                    <div className="glass p-10 rounded-3xl w-full max-w-md border border-white/10 shadow-2xl">
                        <h1 className="text-4xl font-black italic mb-6 text-center text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-500">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && (
                                <>
                                    <input className="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />
                                    <select className="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none" onChange={e => setForm({...form, role: e.target.value})}>
                                        <option value="Switch">Role: Switch</option>
                                        <option value="Dominator">Role: Dominator</option>
                                        <option value="Submissive">Role: Submissive</option>
                                    </select>
                                </>
                            )}
                            <input className="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" placeholder="Email" type="email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-4 rounded-xl font-bold">{mode === 'login' ? 'LOGIN' : 'SIGN UP'}</button>
                            <p className="text-center text-xs opacity-60 cursor-pointer" onClick={() => setMode(mode === 'login' ? 'signup' : 'login')}>
                                {mode === 'login' ? "Need an account? Sign Up" : "Have an account? Login"}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
