<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Force Vibe Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #08080a; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.75); backdrop-filter: blur(25px); border-right: 1px solid rgba(255,255,255,0.05); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.2); color: #d500f9; }
        input[type=range] { accent-color: #d500f9; height: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [view, setView] = useState('chat'); 
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [receivedRequests, setReceivedRequests] = useState([]);
            const [text, setText] = useState('');
            const [intensity, setIntensity] = useState({ heavy: 1.0, light: 1.0 });
            const vibeInterval = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    refreshSocial();
                    const sub = supabaseClient.channel('global')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => fetchMessages())
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => refreshSocial())
                        .subscribe();
                    return () => supabaseClient.removeChannel(sub);
                }
            }, [session, currentChat]);

            const refreshSocial = async () => {
                if (!session) return;
                const { data: fList } = await supabaseClient.from('friends').select('*, sender:profiles!friends_user_id_fkey(*), receiver:profiles!friends_friend_id_fkey(*)').eq('status', 1).or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                const { data: rList } = await supabaseClient.from('friends').select('*, sender:profiles!friends_user_id_fkey(*)').eq('friend_id', session.user.id).eq('status', 0);
                setFriends(fList?.map(f => f.user_id === session.user.id ? f.receiver : f.sender) || []);
                setReceivedRequests(rList || []);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') query = query.is('receiver_id', null);
                else query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                const { data } = await query;
                setMessages(data || []);
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ sender_id: session.user.id, receiver_id: currentChat === 'public' ? null : currentChat, content: text }]);
                setText('');
            };

            const respondRequest = async (id, accept) => {
                if (accept) await supabaseClient.from('friends').update({ status: 1 }).eq('id', id);
                else await supabaseClient.from('friends').delete().eq('id', id);
                refreshSocial();
            };

            // MAXIMUM FORCE VIBRATION LOGIC
            const startVibration = () => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);

                // 1. Force Phone Internal Haptic immediately
                if ("vibrate" in navigator) {
                    navigator.vibrate([200, 100, 200, 100, 200]);
                }

                vibeInterval.current = setInterval(() => {
                    const pads = navigator.getGamepads();
                    for (let gp of pads) {
                        if (gp && gp.vibrationActuator) {
                            // 2. Play high-intensity pulse (best for Bluetooth Safari)
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0,
                                duration: 400,
                                weakMagnitude: intensity.light,
                                strongMagnitude: intensity.heavy
                            }).catch(err => {
                                console.log("Rumble blocked by Safari security policy.");
                            });
                        }
                    }
                }, 150);
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <div className="w-72 glass flex flex-col py-10">
                        <div className="px-8 mb-10 text-2xl font-black italic text-purple-500 tracking-tighter">K-D WORLD</div>
                        <nav className="flex-1">
                            <button onClick={() => setView('chat')} className={`w-full p-4 flex gap-4 items-center transition ${view === 'chat' ? 'active-tab' : 'opacity-50 hover:opacity-100'}`}>💬 <b>Chambers</b></button>
                            <button onClick={() => setView('social')} className={`w-full p-4 flex gap-4 items-center transition ${view === 'social' ? 'active-tab' : 'opacity-50 hover:opacity-100'}`}>👥 <b>Social Hub</b></button>
                            <button onClick={() => setView('vibe')} className={`w-full p-4 flex gap-4 items-center transition ${view === 'vibe' ? 'active-tab' : 'opacity-50 hover:opacity-100'}`}>🎮 <b>Controller</b></button>
                        </nav>
                        <button onClick={() => supabaseClient.auth.signOut()} className="m-6 bg-red-600/10 text-red-500 p-4 rounded-2xl font-bold text-xs uppercase tracking-widest">Logout</button>
                    </div>

                    {/* MAIN AREA */}
                    <main className="flex-1 flex flex-col bg-black/40">
                        {view === 'chat' && (
                            <div className="flex h-full">
                                <div className="w-64 border-r border-white/5 p-4 space-y-2">
                                    <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} className={`w-full p-4 rounded-xl text-left font-bold ${currentChat === 'public' ? 'bg-purple-600 shadow-lg shadow-purple-500/20' : 'hover:bg-white/5'}`}>🌐 Public Chamber</button>
                                    <p className="text-[10px] font-black opacity-20 uppercase px-4 pt-6 tracking-widest">Active Friends</p>
                                    {friends.map(f => (
                                        <button key={f.id} onClick={() => {setCurrentChat(f.id); setCurrentChatName(f.username);}} className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold transition ${currentChat === f.id ? 'bg-white/10' : 'opacity-60 hover:opacity-100'}`}>
                                            <img src={f.avatar_url || 'https://via.placeholder.com/50'} className="w-8 h-8 rounded-full border border-white/10" /> {f.username}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex-1 flex flex-col">
                                    <header className="p-6 border-b border-white/5 font-black text-xl italic flex justify-between">
                                        <span>{currentChatName}</span>
                                        <span className="text-[10px] text-green-500 uppercase tracking-widest">Live</span>
                                    </header>
                                    <div className="flex-1 p-6 overflow-y-auto space-y-4">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.sender_id === session.user.id ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`p-4 rounded-2xl max-w-sm ${m.sender_id === session.user.id ? 'bg-purple-600 font-bold shadow-lg shadow-purple-500/10' : 'bg-white/5 border border-white/10'}`}>{m.content}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-6 flex gap-3">
                                        <input className="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500 transition" placeholder="Type a message..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                        <button onClick={sendMsg} className="bg-purple-600 px-10 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-purple-500 transition">Send</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'social' && (
                            <div className="p-12 max-w-4xl mx-auto w-full space-y-12">
                                <h2 className="text-4xl font-black italic">SOCIAL HUB</h2>
                                <div className="grid grid-cols-2 gap-12">
                                    <section className="space-y-4">
                                        <h3 className="text-xs font-black opacity-30 uppercase tracking-[0.2em]">New Requests</h3>
                                        {receivedRequests.length === 0 && <div className="p-10 border-2 border-dashed border-white/5 rounded-3xl text-center opacity-20 font-bold italic text-sm">Empty</div>}
                                        {receivedRequests.map(r => (
                                            <div key={r.id} className="p-6 glass rounded-[2rem] flex justify-between items-center">
                                                <span className="font-bold text-lg">{r.sender?.username}</span>
                                                <div className="flex gap-2">
                                                    <button onClick={() => respondRequest(r.id, true)} className="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Accept</button>
                                                    <button onClick={() => respondRequest(r.id, false)} className="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Decline</button>
                                                </div>
                                            </div>
                                        ))}
                                    </section>
                                    <section className="space-y-4">
                                        <h3 className="text-xs font-black opacity-30 uppercase tracking-[0.2em]">Friend List</h3>
                                        {friends.map(f => (
                                            <div key={f.id} className="p-5 glass rounded-[2rem] flex justify-between items-center">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                                    <span className="font-bold">{f.username}</span>
                                                </div>
                                                <button onClick={() => {setView('chat'); setCurrentChat(f.id); setCurrentChatName(f.username);}} className="bg-purple-600 p-3 rounded-xl hover:scale-110 transition">💬</button>
                                            </div>
                                        ))}
                                    </section>
                                </div>
                            </div>
                        )}

                        {view === 'vibe' && (
                            <div className="h-full flex items-center justify-center p-6">
                                <div className="p-16 glass rounded-[4rem] w-full max-w-2xl text-center space-y-12 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent"></div>
                                    <h2 className="text-4xl font-black text-purple-500 italic">VIBRATION CONSOLE</h2>
                                    
                                    <div className="grid grid-cols-1 gap-8">
                                        <div className="space-y-4">
                                            <div className="flex justify-between font-black text-[10px] uppercase opacity-40"><span>Main Rumble</span><span>{Math.round(intensity.heavy * 100)}%</span></div>
                                            <input type="range" min="0" max="1" step="0.1" className="w-full" value={intensity.heavy} onChange={e => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} />
                                        </div>
                                    </div>

                                    <div className="flex gap-6">
                                        <button onClick={startVibration} className="flex-1 bg-purple-600 py-8 rounded-[2rem] font-black text-sm tracking-[0.3em] uppercase shadow-2xl shadow-purple-600/30 hover:bg-purple-500 transition active:scale-95">Test Vibration</button>
                                        <button onClick={() => {if(vibeInterval.current) clearInterval(vibeInterval.current); if(navigator.vibrate) navigator.vibrate(0);}} className="flex-1 bg-white/5 py-8 rounded-[2rem] font-black text-xs uppercase tracking-widest hover:bg-white/10 transition">Stop</button>
                                    </div>

                                    <div className="p-6 bg-black/40 rounded-3xl text-[10px] text-left space-y-3 font-bold uppercase opacity-40 tracking-wider">
                                        <p>1. Connect PS4 via Bluetooth (Settings)</p>
                                        <p>2. Press X or Circle on Controller to "Wake" Safari</p>
                                        <p>3. Tap Test Button (Force Vibe will shake phone + controller)</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data, error } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username }]);
                    if (error) alert(error.message);
                } else {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
                    if (error) alert(error.message);
                }
            };
            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="p-12 glass text-center w-full max-w-sm rounded-[3rem] border border-white/5">
                        <h1 className="text-4xl font-black text-purple-500 italic mb-10 tracking-tighter">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && <input className="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none text-xs" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />}
                            <input className="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none text-xs" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none text-xs" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-6 rounded-3xl font-black uppercase text-xs tracking-widest shadow-xl shadow-purple-600/20">{mode}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-[10px] cursor-pointer mt-6 uppercase opacity-40 font-bold tracking-widest">Switch to {mode === 'login' ? 'Signup' : 'Login'}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
