<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-D WORLD | Hardware Unlock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white h-screen flex items-center justify-center overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function VibeConsole() {
            const [isActive, setIsActive] = useState(false);
            const vibeLoop = useRef(null);

            const startForceVibe = async () => {
                if (isActive) {
                    clearInterval(vibeLoop.current);
                    setIsActive(false);
                    return;
                }

                setIsActive(true);

                // FORCE 1: Shake the actual iPhone immediately
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

                vibeLoop.current = setInterval(() => {
                    const gamepads = navigator.getGamepads();
                    let hardwareFound = false;

                    for (const gp of gamepads) {
                        if (gp && gp.vibrationActuator) {
                            hardwareFound = true;
                            // FORCE 2: Send the 'dual-rumble' command
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0,
                                duration: 300,
                                weakMagnitude: 1.0,
                                strongMagnitude: 1.0
                            }).catch(() => {
                                // Fallback to phone if controller blocks it
                                if (navigator.vibrate) navigator.vibrate(200);
                            });
                        }
                    }

                    // FORCE 3: If Bluetooth is ignoring the controller, make the phone shake instead
                    if (!hardwareFound && navigator.vibrate) {
                        navigator.vibrate(200);
                    }
                }, 200);
            };

            return (
                <div className="p-10 bg-zinc-900 border border-white/10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
                    <h1 className="text-3xl font-black italic text-purple-500 mb-8">K-D VIBE</h1>
                    
                    <button 
                        onPointerDown={startForceVibe}
                        className={`w-full py-10 rounded-3xl font-black uppercase tracking-widest transition-all ${isActive ? 'bg-red-600' : 'bg-purple-600 shadow-lg shadow-purple-500/20'}`}
                    >
                        {isActive ? 'Stop' : 'Trigger Motor'}
                    </button>

                    <div className="mt-8 p-4 bg-black/50 rounded-2xl text-[10px] text-left space-y-2 opacity-50 font-bold uppercase leading-relaxed">
                        <p>1. Open this via <span className="text-white">Home Screen Icon</span> only.</p>
                        <p>2. Tap button, then <span className="text-white">Press Square/Circle</span> on PS4 controller.</p>
                        <p>3. Ensure <span className="text-red-500">Low Power Mode</span> is OFF.</p>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<VibeConsole />);
    </script>
</body>
</html>
