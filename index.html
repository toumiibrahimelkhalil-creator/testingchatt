<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Professional Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d500f9;
            --primary-glow: rgba(213, 0, 249, 0.4);
            --bg-dark: #050507;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background: radial-gradient(circle at top left, #1a0b2e 0%, var(--bg-dark) 40%);
            color: #e2e2e2; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }

        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border); 
        }
        
        .active-tab { 
            background: linear-gradient(90deg, rgba(213, 0, 249, 0.2) 0%, transparent 100%);
            border-left: 4px solid var(--primary); 
            color: #fff; 
        }

        .nav-btn { 
            transition: all 0.3s; 
            border-radius: 0 12px 12px 0; 
            margin: 8px 0; 
            padding: 14px 20px; 
            text-align: left; 
            color: rgba(255,255,255,0.6);
            border-left: 4px solid transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('chat'); 
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [receivedRequests, setReceivedRequests] = useState([]);
            const [text, setText] = useState('');
            const [searchName, setSearchName] = useState('');
            const [intensity, setIntensity] = useState({ heavy: 1.0, light: 1.0 });
            const vibeInterval = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    refreshSocial();
                    const sub = supabaseClient.channel('db-sync')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => fetchMessages())
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, () => refreshSocial())
                        .subscribe();
                    return () => supabaseClient.removeChannel(sub);
                }
            }, [session, currentChat]);

            useEffect(() => { fetchMessages(); }, [currentChat, session]);

            const refreshSocial = async () => {
                if (!session) return;
                
                // Get Accepted Friends
                const { data: fList } = await supabaseClient.from('friends')
                    .select('*, sender:profiles!friends_user_id_fkey(*), receiver:profiles!friends_friend_id_fkey(*)')
                    .eq('status', 1)
                    .or(`user_id.eq.${session.user.id},friend_id.eq.${session.user.id}`);
                
                // Get Received Requests (Decide to Accept/Decline)
                const { data: rList } = await supabaseClient.from('friends')
                    .select('*, sender:profiles!friends_user_id_fkey(*)')
                    .eq('friend_id', session.user.id)
                    .eq('status', 0);
                
                setFriends(fList?.map(f => f.user_id === session.user.id ? f.receiver : f.sender).filter(Boolean) || []);
                setReceivedRequests(rList || []);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') query = query.is('receiver_id', null);
                else query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                const { data } = await query;
                setMessages(data || []);
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ 
                    sender_id: session.user.id, 
                    receiver_id: currentChat === 'public' ? null : currentChat, 
                    content: text 
                }]);
                setText('');
            };

            const handleAddFriend = async () => {
                const { data: target } = await supabaseClient.from('profiles').select('id').ilike('username', searchName).single();
                if (!target) return alert("User not found!");
                const { error } = await supabaseClient.from('friends').insert([{ user_id: session.user.id, friend_id: target.id, status: 0 }]);
                if (error) alert("Already requested!"); else { alert("Sent!"); setSearchName(''); refreshSocial(); }
            };

            const respondRequest = async (id, accept) => {
                if (accept) await supabaseClient.from('friends').update({ status: 1 }).eq('id', id);
                else await supabaseClient.from('friends').delete().eq('id', id);
                refreshSocial();
            };

            const startVibe = () => {
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                vibeInterval.current = setInterval(() => {
                    const gps = navigator.getGamepads();
                    for (const gp of gps) {
                        if (gp?.vibrationActuator) {
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                duration: 250, weakMagnitude: intensity.light, strongMagnitude: intensity.heavy
                            });
                        }
                    }
                }, 180); 
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <div className="w-20 lg:w-72 glass flex flex-col py-8 z-10 border-r border-white/5">
                        <div className="px-8 mb-12 hidden lg:block text-2xl font-black italic text-purple-500">K-D WORLD</div>
                        <nav className="flex-1 flex flex-col gap-2">
                            <button onClick={() => setView('chat')} className={`nav-btn flex items-center gap-4 ${view === 'chat' ? 'active-tab' : ''}`}><span>💬</span> <span className="hidden lg:inline font-bold">Chambers</span></button>
                            <button onClick={() => setView('social')} className={`nav-btn flex items-center gap-4 ${view === 'social' ? 'active-tab' : ''}`}><span>👥</span> <span className="hidden lg:inline font-bold">Social Hub</span></button>
                            <button onClick={() => setView('vibe')} className={`nav-btn flex items-center gap-4 ${view === 'vibe' ? 'active-tab' : ''}`}><span>🎮</span> <span className="hidden lg:inline font-bold">Vibration Console</span></button>
                        </nav>
                        <button onClick={() => supabaseClient.auth.signOut()} className="m-6 bg-red-600/10 text-red-500 p-4 rounded-xl font-black text-xs uppercase">Logout</button>
                    </div>

                    {/* MAIN */}
                    <div className="flex-1 flex flex-col bg-black/40">
                        {view === 'chat' && (
                            <div className="flex h-full overflow-hidden">
                                <div className="w-64 border-r border-white/5 p-4 space-y-2">
                                    <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} className={`w-full p-4 rounded-xl text-left font-bold ${currentChat === 'public' ? 'bg-purple-600' : 'hover:bg-white/5'}`}>🌐 Public Chamber</button>
                                    <p className="text-[10px] font-black opacity-20 uppercase px-4 pt-4">Direct Friends</p>
                                    {friends.map(f => (
                                        <button key={f.id} onClick={() => {setCurrentChat(f.id); setCurrentChatName(f.username);}} className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold ${currentChat === f.id ? 'bg-white/10' : ''}`}>
                                            <img src={f.avatar_url || 'https://via.placeholder.com/50'} className="w-8 h-8 rounded-full object-cover" /> {f.username}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex-1 flex flex-col">
                                    <header className="p-6 border-b border-white/5 font-black text-xl italic">{currentChatName}</header>
                                    <div className="flex-1 p-6 overflow-y-auto space-y-4">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.sender_id === session.user.id ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`p-4 rounded-2xl max-w-sm ${m.sender_id === session.user.id ? 'bg-purple-600 font-bold' : 'bg-white/5 border border-white/10'}`}>{m.content}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-6 flex gap-2">
                                        <input className="flex-1 bg-white/5 border border-white/10 p-4 rounded-xl outline-none" value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                        <button onClick={sendMsg} className="bg-purple-600 px-8 rounded-xl font-black">SEND</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'social' && (
                            <div className="p-12 max-w-4xl mx-auto w-full space-y-10">
                                <h2 className="text-4xl font-black italic">Social Hub</h2>
                                <div className="glass p-6 rounded-2xl flex gap-3">
                                    <input className="flex-1 bg-black/40 p-4 rounded-xl outline-none" placeholder="Find user..." value={searchName} onChange={e => setSearchName(e.target.value)} />
                                    <button onClick={handleAddFriend} className="bg-white text-black px-10 rounded-xl font-black">ADD</button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <section className="space-y-4">
                                        <h3 className="text-xs font-black opacity-30 uppercase tracking-widest">Received Requests</h3>
                                        {receivedRequests.map(r => (
                                            <div key={r.id} className="glass p-4 rounded-xl flex justify-between items-center">
                                                <span className="font-bold">{r.sender?.username}</span>
                                                <div className="flex gap-2">
                                                    <button onClick={() => respondRequest(r.id, true)} className="bg-green-500 px-4 py-2 rounded-lg font-bold text-[10px]">ACCEPT</button>
                                                    <button onClick={() => respondRequest(r.id, false)} className="bg-red-500/20 text-red-500 px-4 py-2 rounded-lg font-bold text-[10px]">DECLINE</button>
                                                </div>
                                            </div>
                                        ))}
                                    </section>
                                    <section className="space-y-4">
                                        <h3 className="text-xs font-black opacity-30 uppercase tracking-widest">My Friends</h3>
                                        {friends.map(f => (
                                            <div key={f.id} className="glass p-4 rounded-xl flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <img src={f.avatar_url || 'https://via.placeholder.com/50'} className="w-10 h-10 rounded-full object-cover" />
                                                    <span className="font-bold">{f.username}</span>
                                                </div>
                                                <button onClick={() => {setView('chat'); setCurrentChat(f.id); setCurrentChatName(f.username);}} className="bg-purple-600 p-2 rounded-lg">💬</button>
                                            </div>
                                        ))}
                                    </section>
                                </div>
                            </div>
                        )}

                        {view === 'vibe' && (
                            <div className="flex-1 flex items-center justify-center p-12">
                                <div className="glass p-12 rounded-[3rem] w-full max-w-xl text-center space-y-8">
                                    <h2 className="text-4xl font-black italic text-purple-500">VIBRATION CONSOLE</h2>
                                    <input type="range" min="0" max="1" step="0.1" className="w-full" value={intensity.heavy} onChange={e => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} />
                                    <div className="flex gap-4">
                                        <button onClick={startVibe} className="flex-1 bg-purple-600 py-6 rounded-2xl font-black">ACTIVATE</button>
                                        <button onClick={() => clearInterval(vibeInterval.current)} className="flex-1 bg-white/5 py-6 rounded-2xl font-black">STOP</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username }]);
                } else {
                    await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
                }
            };
            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="glass p-12 rounded-[3rem] w-full max-w-md text-center space-y-6">
                        <h1 className="text-4xl font-black text-purple-500 italic">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />}
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-5 rounded-2xl font-black uppercase tracking-widest">{mode}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="cursor-pointer opacity-50 text-[10px] font-bold uppercase tracking-widest mt-4">Switch to {mode === 'login' ? 'Signup' : 'Login'}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
