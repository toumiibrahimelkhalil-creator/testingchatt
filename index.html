<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | Private & Secure</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.1); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.1); }
        .msg-mine { background: #4a148c; border-radius: 12px 12px 0 12px; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 12px 12px 12px 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [currentChat, setCurrentChat] = useState('public');
            const [currentChatName, setCurrentChatName] = useState('Public Chamber');
            const [messages, setMessages] = useState([]);
            const [friends, setFriends] = useState([]);
            const [requests, setRequests] = useState([]);
            const [text, setText] = useState('');
            const [searchUsername, setSearchUsername] = useState('');
            const [uploading, setUploading] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                if (session) {
                    fetchProfile();
                    fetchFriends();
                    fetchRequests();
                }
            }, [session]);

            useEffect(() => {
                if (session) {
                    fetchMessages();
                    const channel = supabaseClient.channel('realtime:messages')
                        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => fetchMessages())
                        .subscribe();
                    return () => supabaseClient.removeChannel(channel);
                }
            }, [currentChat, session]);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const fetchProfile = async () => {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                if (data) setProfile(data);
            };

            const fetchFriends = async () => {
                const { data } = await supabaseClient.from('friends').select('friend_id, profiles!friends_friend_id_fkey(*)').eq('user_id', session.user.id).eq('status', 1);
                if (data) setFriends(data);
            };

            const fetchRequests = async () => {
                const { data } = await supabaseClient.from('friends').select('id, user_id, profiles!friends_user_id_fkey(*)').eq('friend_id', session.user.id).eq('status', 0);
                if (data) setRequests(data);
            };

            const fetchMessages = async () => {
                let query = supabaseClient.from('messages').select('*, profiles!messages_sender_id_fkey(*)').order('created_at', { ascending: true });
                if (currentChat === 'public') query = query.is('receiver_id', null);
                else query = query.or(`and(sender_id.eq.${session.user.id},receiver_id.eq.${currentChat}),and(sender_id.eq.${currentChat},receiver_id.eq.${session.user.id})`);
                const { data } = await query;
                if (data) setMessages(data);
            };

            // UPDATED: PERMANENT USERNAME CHANGE
            const handleUpdateProfile = async (newUsername) => {
                const { error } = await supabaseClient.from('profiles').update({ username: newUsername }).eq('id', session.user.id);
                if (!error) fetchProfile();
            };

            // ADDED: PROFILE PICTURE UPLOAD
            const handleProfilePicUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setUploading(true);
                const fileExt = file.name.split('.').pop();
                const fileName = `${session.user.id}-${Math.random()}.${fileExt}`;
                
                // 1. Upload to Storage
                const { data, error } = await supabaseClient.storage
                    .from('uploads')
                    .upload(fileName, file);
                    
                if (error) {
                    alert("Upload failed: " + error.message);
                    setUploading(false);
                    return;
                }

                // 2. Get Public URL
                const { data: { publicUrl } } = supabaseClient.storage
                    .from('uploads')
                    .getPublicUrl(fileName);

                // 3. Update the Profile table with the new URL
                const { error: updateError } = await supabaseClient.from('profiles')
                    .update({ avatar_url: publicUrl })
                    .eq('id', session.user.id);

                if (!updateError) fetchProfile();
                setUploading(false);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                const { data, error } = await supabaseClient.storage.from('uploads').upload(fileName, file);
                
                if (data) {
                    const { data: { publicUrl } } = supabaseClient.storage.from('uploads').getPublicUrl(fileName);
                    await supabaseClient.from('messages').insert([{
                        sender_id: session.user.id,
                        receiver_id: currentChat === 'public' ? null : currentChat,
                        content: publicUrl 
                    }]);
                }
                setUploading(false);
            };

            const handleAddFriend = async () => {
                const { data: user } = await supabaseClient.from('profiles').select('id').eq('username', searchUsername).single();
                if (user) {
                    await supabaseClient.from('friends').insert([{ user_id: session.user.id, friend_id: user.id, status: 0 }]);
                    alert("Request Sent!");
                    setSearchUsername('');
                }
            };

            const handleRequest = async (id, accept) => {
                if (accept) {
                    const { data: req } = await supabaseClient.from('friends').select('*').eq('id', id).single();
                    await supabaseClient.from('friends').update({ status: 1 }).eq('id', id);
                    await supabaseClient.from('friends').insert([{ user_id: session.user.id, friend_id: req.user_id, status: 1 }]);
                } else {
                    await supabaseClient.from('friends').delete().eq('id', id);
                }
                fetchRequests();
                fetchFriends();
            };

            const sendMsg = async () => {
                if (!text.trim()) return;
                await supabaseClient.from('messages').insert([{ sender_id: session.user.id, receiver_id: currentChat === 'public' ? null : currentChat, content: text }]);
                setText('');
            };

            if (!session) return <AuthUI />;

            return (
                <div className="flex h-screen">
                    <div className="w-80 glass flex flex-col shadow-2xl z-10 border-r border-white/5">
                        <div className="p-6 border-b border-white/10">
                            <h2 className="text-xl font-black text-purple-400 italic">K-D WORLD</h2>
                            {profile && (
                                <div className="mt-4 flex items-center gap-3">
                                    {/* UPDATED: CLICKABLE AVATAR FOR UPLOAD */}
                                    <label className="cursor-pointer group relative">
                                        <div className={`w-12 h-12 rounded-full bg-purple-900 border border-purple-500 overflow-hidden ${uploading ? 'opacity-50' : ''}`}>
                                            {profile.avatar_url ? 
                                                <img src={profile.avatar_url} className="w-full h-full object-cover" /> : 
                                                <div className="flex items-center justify-center h-full opacity-50 text-[10px]">📷</div>
                                            }
                                        </div>
                                        <input type="file" className="hidden" onChange={handleProfilePicUpload} accept="image/*" />
                                    </label>
                                    <div className="flex-1">
                                        <input 
                                            className="bg-transparent font-bold text-sm focus:border-b border-purple-500 outline-none w-full"
                                            defaultValue={profile.username}
                                            onBlur={(e) => handleUpdateProfile(e.target.value)}
                                        />
                                        <p className="text-[10px] opacity-50 uppercase">{profile.role}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                        
                        <div className="flex-1 overflow-y-auto">
                            <button onClick={() => {setCurrentChat('public'); setCurrentChatName('Public Chamber');}} className={`w-full p-4 text-left font-bold ${currentChat === 'public' ? 'active-tab' : 'hover:bg-white/5'}`}>🌐 Public Chamber</button>
                            
                            <div className="p-4 border-t border-white/5">
                                <p className="text-[10px] font-bold opacity-40 mb-2">FRIEND REQUESTS ({requests.length})</p>
                                {requests.map(r => (
                                    <div key={r.id} className="flex items-center justify-between bg-white/5 p-2 rounded mb-2">
                                        <span className="text-xs font-bold">{r.profiles.username}</span>
                                        <div className="flex gap-1">
                                            <button onClick={() => handleRequest(r.id, true)} className="bg-green-600 px-2 py-1 rounded text-[10px]">Accept</button>
                                            <button onClick={() => handleRequest(r.id, false)} className="bg-red-600 px-2 py-1 rounded text-[10px]">Delete</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="p-4 border-t border-white/5">
                                <p className="text-[10px] font-bold opacity-40 mb-2">ADD FRIEND</p>
                                <div className="flex gap-2">
                                    <input className="flex-1 bg-black/40 border border-white/10 rounded px-2 py-1 text-xs outline-none focus:border-purple-500" placeholder="Username..." value={searchUsername} onChange={e => setSearchUsername(e.target.value)} />
                                    <button onClick={handleAddFriend} className="bg-purple-600 px-3 py-1 rounded text-xs">+</button>
                                </div>
                            </div>

                            <div className="p-4">
                                <p className="text-[10px] font-bold opacity-40 mb-2">DIRECT MESSAGES</p>
                                {friends.map(f => (
                                    <button key={f.friend_id} onClick={() => {setCurrentChat(f.friend_id); setCurrentChatName(f.profiles.username);}} className={`w-full p-2 text-left rounded mb-1 text-sm ${currentChat === f.friend_id ? 'bg-purple-600/20 text-purple-400' : 'hover:bg-white/5'}`}>
                                        ● {f.profiles.username}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <button onClick={() => supabaseClient.auth.signOut()} className="p-4 text-xs opacity-50 hover:opacity-100">Logout</button>
                    </div>

                    <div className="flex-1 flex flex-col bg-black/20">
                        <header className="p-4 border-b border-white/5 font-bold">{currentChatName}</header>
                        <div className="flex-1 p-6 overflow-y-auto space-y-4">
                            {messages.map((msg, i) => {
                                const isMine = msg.sender_id === session.user.id;
                                const isFile = msg.content.startsWith('http') && msg.content.includes('supabase.co/storage');
                                return (
                                    <div key={i} className={`flex flex-col ${isMine ? 'items-end' : 'items-start'}`}>
                                        <span className="text-[10px] opacity-40 mb-1">{msg.profiles?.username}</span>
                                        <div className={`p-3 max-w-sm rounded-xl ${isMine ? 'bg-purple-700' : 'bg-gray-800'}`}>
                                            {isFile ? (
                                                msg.content.match(/\.(jpg|jpeg|png|gif)$/i) ? 
                                                <img src={msg.content} className="max-w-full rounded" /> : 
                                                <video src={msg.content} controls className="max-w-full rounded" />
                                            ) : msg.content}
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-4 border-t border-white/10 flex gap-2 items-center">
                            <label className="cursor-pointer p-2 bg-white/5 rounded-xl hover:bg-white/10">
                                📎
                                <input type="file" className="hidden" onChange={handleFileUpload} />
                            </label>
                            <input className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none" placeholder="Message..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                            <button onClick={sendMsg} className="bg-purple-600 px-6 py-3 rounded-xl font-bold">SEND</button>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthUI() {
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', username: '', role: 'Switch' });
            const handleAction = async () => {
                if (mode === 'signup') {
                    const { data } = await supabaseClient.auth.signUp({ email: form.email, password: form.password });
                    if (data.user) await supabaseClient.from('profiles').insert([{ id: data.user.id, username: form.username, role: form.role }]);
                } else {
                    await supabaseClient.auth.signInWithPassword({ email: form.email, password: form.password });
                }
            };
            return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="glass p-10 rounded-3xl w-full max-w-sm border border-white/10">
                        <h1 className="text-3xl font-black text-center mb-6 text-purple-500">K-D WORLD</h1>
                        <div className="space-y-4">
                            {mode === 'signup' && (
                                <>
                                    <input className="w-full bg-white/5 p-3 rounded-xl border border-white/10" placeholder="Username" onChange={e => setForm({...form, username: e.target.value})} />
                                    <select className="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none" onChange={e => setForm({...form, role: e.target.value})}>
                                        <option value="Switch">Role: Switch</option>
                                        <option value="Dominator">Role: Dominator</option>
                                        <option value="Submissive">Role: Submissive</option>
                                    </select>
                                </>
                            )}
                            <input className="w-full bg-white/5 p-3 rounded-xl border border-white/10" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <input className="w-full bg-white/5 p-3 rounded-xl border border-white/10" type="password" placeholder="Password" onChange={e => setForm({...form, password: e.target.value})} />
                            <button onClick={handleAction} className="w-full bg-purple-600 p-4 rounded-xl font-bold">{mode.toUpperCase()}</button>
                            <p onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} className="text-center text-xs opacity-50 cursor-pointer">Switch to {mode === 'login' ? 'Signup' : 'Login'}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
