<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D World | RumbleCTRL Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #08080a; color: #e2e2e2; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); }
        .active-tab { border-left: 4px solid #d500f9; background: rgba(213, 0, 249, 0.15); color: #d500f9; }
        .msg-mine { background: linear-gradient(135deg, #6a1b9a, #4a148c); border-radius: 18px 18px 2px 18px; }
        .msg-theirs { background: #1e1e24; border: 1px solid #333; border-radius: 18px 18px 18px 2px; }
        .nav-btn { transition: all 0.2s ease; border-radius: 12px; margin: 4px 12px; padding: 12px; text-align: left; }
        
        /* RumbleCTRL Pro Styles */
        .vibe-panel { background: rgba(213, 0, 249, 0.03); border-bottom: 1px solid rgba(213, 0, 249, 0.1); }
        .btn-start { background: #d500f9; box-shadow: 0 0 20px rgba(213, 0, 249, 0.4); }
        .btn-stop { background: #ff1744; box-shadow: 0 0 20px rgba(255, 23, 68, 0.4); }
        .vibe-btn:active { transform: scale(0.95); }
        input[type=range] { accent-color: #d500f9; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://ycdcszdldkccnwefrpik.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZGNzemRsZGtjY253ZWZycGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzkyMzcsImV4cCI6MjA5MDg1NTIzN30.i7kxP4TXxuIujsRwGMOC08-NYJopFj6x0OB4BkN9dfQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('chat'); 
            const [currentChat, setCurrentChat] = useState('public');
            const [messages, setMessages] = useState([]);
            const [hasGamepad, setHasGamepad] = useState(false);
            
            // Vibration Control State
            const [intensity, setIntensity] = useState({ heavy: 1.0, light: 1.0 });
            const [isVibrating, setIsVibrating] = useState(false);
            const vibeInterval = useRef(null);

            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabaseClient.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            useEffect(() => {
                if (session) {
                    const vibeChannel = supabaseClient.channel(`vibe-${currentChat}`)
                        .on('broadcast', { event: 'vibe_cmd' }, ({ payload }) => {
                            if (payload.action === 'START') {
                                startLocalVibe(payload.settings);
                            } else {
                                stopLocalVibe();
                            }
                        })
                        .subscribe();

                    const checkGP = () => setHasGamepad(Object.values(navigator.getGamepads()).some(g => g !== null));
                    window.addEventListener("gamepadconnected", checkGP);
                    window.addEventListener("gamepaddisconnected", checkGP);

                    return () => {
                        supabaseClient.removeChannel(vibeChannel);
                        stopLocalVibe();
                    };
                }
            }, [session, currentChat]);

            const startLocalVibe = (settings) => {
                setIsVibrating(true);
                if (vibeInterval.current) clearInterval(vibeInterval.current);

                const run = () => {
                    const gps = navigator.getGamepads();
                    for (const gp of gps) {
                        if (gp?.vibrationActuator) {
                            gp.vibrationActuator.playEffect("dual-rumble", {
                                startDelay: 0,
                                duration: 200, // Short duration for rapid overlap
                                weakMagnitude: settings.light,
                                strongMagnitude: settings.heavy
                            });
                        }
                    }
                };
                run();
                // 150ms interval creates a "continuous" feel because 150 < 200
                vibeInterval.current = setInterval(run, 150); 
            };

            const stopLocalVibe = () => {
                setIsVibrating(false);
                if (vibeInterval.current) clearInterval(vibeInterval.current);
                vibeInterval.current = null;
            };

            const broadcastAction = async (action) => {
                // Immediate local response for the person clicking
                if (action === 'START') startLocalVibe(intensity);
                else stopLocalVibe();

                // Broadcast to everyone else in the room
                const channel = supabaseClient.channel(`vibe-${currentChat}`);
                await channel.send({
                    type: 'broadcast',
                    event: 'vibe_cmd',
                    payload: { action, settings: intensity }
                });
            };

            if (!session) return <div className="h-screen flex items-center justify-center font-black text-purple-500 italic text-2xl">K-D WORLD</div>;

            return (
                <div className="flex h-screen">
                    <div className="w-72 glass flex flex-col py-6">
                        <div className="px-6 mb-10"><h1 className="text-2xl font-black text-purple-500 italic">K-D WORLD</h1></div>
                        <nav className="flex-1">
                            <button onClick={() => setView('chat')} className={`nav-btn w-full flex items-center gap-4 ${view === 'chat' ? 'active-tab' : ''}`}>
                                💬 <span className="font-bold uppercase text-xs tracking-widest">Chambers</span>
                            </button>
                        </nav>
                    </div>

                    <div className="flex-1 flex flex-col bg-[#050507]">
                        <header className="p-6 border-b border-white/5 flex items-center justify-between">
                            <h2 className="font-black text-xl italic uppercase tracking-tighter">Public Chamber</h2>
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${hasGamepad ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div>
                                <span className="text-[10px] font-black opacity-40 uppercase tracking-widest">{hasGamepad ? 'Linked' : 'No Device'}</span>
                            </div>
                        </header>

                        {/* ADVANCED CONTROL PANEL */}
                        <div className="vibe-panel p-8">
                            <div className="max-w-xl mx-auto">
                                <div className="grid grid-cols-2 gap-10 mb-8">
                                    <div className="flex flex-col gap-3">
                                        <div className="flex justify-between text-[10px] font-bold opacity-30 uppercase">
                                            <span>Heavy Level</span>
                                            <span>{Math.round(intensity.heavy * 100)}%</span>
                                        </div>
                                        <input type="range" min="0" max="1" step="0.1" value={intensity.heavy} onChange={e => setIntensity({...intensity, heavy: parseFloat(e.target.value)})} />
                                    </div>
                                    <div className="flex flex-col gap-3">
                                        <div className="flex justify-between text-[10px] font-bold opacity-30 uppercase">
                                            <span>Light Level</span>
                                            <span>{Math.round(intensity.light * 100)}%</span>
                                        </div>
                                        <input type="range" min="0" max="1" step="0.1" value={intensity.light} onChange={e => setIntensity({...intensity, light: parseFloat(e.target.value)})} />
                                    </div>
                                </div>

                                <div className="flex justify-center gap-4">
                                    <button 
                                        onClick={() => broadcastAction('START')} 
                                        className="btn-start vibe-btn px-12 py-4 rounded-xl font-black text-xs uppercase tracking-widest"
                                    >
                                        Start Constant
                                    </button>
                                    <button 
                                        onClick={() => broadcastAction('STOP')} 
                                        className="btn-stop vibe-btn px-12 py-4 rounded-xl font-black text-xs uppercase tracking-widest"
                                    >
                                        Stop Vibration
                                    </button>
                                </div>
                                <p className="text-center text-[9px] mt-4 opacity-20 uppercase font-bold italic tracking-widest">
                                    {isVibrating ? 'Vibration Active - Syncing with room' : 'Ready to Sync'}
                                </p>
                            </div>
                        </div>

                        <div className="flex-1 p-6 bg-black/20 overflow-y-auto">
                            <div className="text-center py-20 opacity-10 font-black text-4xl italic uppercase">Chamber Active</div>
                        </div>

                        <div className="p-6 border-t border-white/5 bg-black/40">
                            <div className="max-w-4xl mx-auto flex gap-4">
                                <input className="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none text-sm" placeholder="Send a message..." />
                                <button className="bg-purple-600 px-8 rounded-2xl font-black text-xs uppercase italic">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
